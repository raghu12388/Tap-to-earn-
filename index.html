 <!DOCTYPE html>
<html>
<head>
<title>Tap2Earn FINAL</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;text-align:center;padding-bottom:80px}
.page{display:none}
.active{display:block}
.tap{width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,#ff00cc,#330066);border:none;font-size:30px;color:white}
.btn{padding:10px;margin:5px;border:none;border-radius:10px;background:#ff00cc;color:white}
.footer{position:fixed;bottom:0;width:100%;height:60px;background:#111;display:flex;justify-content:space-around;align-items:center}
.nav{background:none;border:none;color:#aaa}
.nav.active{color:#ff00cc}
</style>
</head>

<body>

<div id="home" class="page active">
<h2>💰 <span id="coins">0</span></h2>
<p>Level: <span id="level">1</span></p>

<button class="tap" onclick="tap()">🚀</button><br><br>

<button class="btn" onclick="watchAd()">Watch Ad</button>
<button class="btn" onclick="daily()">Daily</button>
<button class="btn" onclick="share()">Invite</button>
</div>

<div id="spinPage" class="page">
<h3>🎰 Spin Wheel</h3>
<canvas id="wheel" width="260" height="260"></canvas><br><br>
<button class="btn" onclick="spinAd()">Spin (Ad)</button>
</div>

<div class="footer">
<button class="nav active" onclick="nav('home',this)">Home</button>
<button class="nav" onclick="nav('spinPage',this)">Spin</button>
</div>

<script>

// ===== 🔥 AD LINK =====
const AD_LINK =https://www.profitablecpmratenetwork.com/v461hnp1f?key=1b701233666cb461a77abce620d8c1ae

// ===== 🔥 FIREBASE =====
const firebaseConfig = {
  apiKey: "AIzaSyD3mNkuJEZ8DpnCuz89wToiVrE9YvC-W7E",
  authDomain: "tap2earn-4ef6d.firebaseapp.com",
  databaseURL: "https://tap2earn-4ef6d-default-rtdb.firebaseio.com/",
  projectId: "tap2earn-4ef6d",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===== USER =====
let tg = window.Telegram?.WebApp;
let userId = tg?.initDataUnsafe?.user?.id || "user_"+Math.floor(Math.random()*999999);
let ref = new URLSearchParams(location.search).get("ref");

// ===== DATA =====
let coins=0, level=1, ads=0;

// ===== LOAD =====
function load(){
db.ref("users/"+userId).once("value",snap=>{
let d=snap.val();

if(!d){
let bonus=0;

if(ref && ref!==userId){
bonus=500;
db.ref("users/"+ref+"/coins").transaction(c=>(c||0)+500);
}

db.ref("users/"+userId).set({
coins:100+bonus,
level:1,
ads:0,
lastDaily:""
});

}else{
coins=d.coins||0;
level=d.level||1;
ads=d.ads||0;
}

update();
});
}

// ===== SAVE =====
function save(){
db.ref("users/"+userId).update({coins,level,ads});
}

// ===== UI =====
function update(){
document.getElementById("coins").innerText=coins;
document.getElementById("level").innerText=level;
}

// ===== NAV =====
function nav(id,btn){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");

document.querySelectorAll(".nav").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

// ===== TAP =====
function tap(){
coins += (1 + level);
levelUp();
update();
save();
}

// ===== LEVEL =====
function levelUp(){
let newLevel=Math.floor(coins/1000)+1;
if(newLevel>level){
level=newLevel;
alert("🔥 Level "+level);
}
}

// ===== DAILY =====
function daily(){
let today=new Date().toDateString();

db.ref("users/"+userId+"/lastDaily").once("value",snap=>{
if(snap.val()===today){
alert("Already claimed");
return;
}

coins+=500;
save();
db.ref("users/"+userId).update({lastDaily:today});
alert("🎁 Daily +500");
});
}

// ===== AD (FIXED FOR TELEGRAM) =====
function watchAd(){
localStorage.setItem("ad_start",Date.now());

if(window.Telegram && Telegram.WebApp){
Telegram.WebApp.openLink(AD_LINK);
}else{
window.open(AD_LINK,"_blank");
}
}

// ===== VERIFY =====
window.onfocus=function(){
let s=localStorage.getItem("ad_start");
if(!s) return;

let t=Date.now()-s;
localStorage.removeItem("ad_start");

if(t>6000){
coins+=150;
ads++;
update();
save();
alert("💰 Ad reward");

if(localStorage.getItem("spin")){
localStorage.removeItem("spin");
spin();
}

}else{
alert("Stay longer");
}
}

// ===== SPIN WHEEL =====
const canvas=document.getElementById("wheel");

if(canvas){
const ctx=canvas.getContext("2d");
const rewards=[50,100,200,300,500,1000];
const arc=(2*Math.PI)/rewards.length;

function draw(){
for(let i=0;i<rewards.length;i++){
ctx.beginPath();
ctx.fillStyle=i%2?"#ff00cc":"#330066";
ctx.moveTo(130,130);
ctx.arc(130,130,130,i*arc,(i+1)*arc);
ctx.fill();

ctx.save();
ctx.translate(130,130);
ctx.rotate(i*arc+arc/2);
ctx.fillStyle="white";
ctx.fillText(rewards[i],80,10);
ctx.restore();
}
}

draw();

window.spinAd=function(){
localStorage.setItem("spin","yes");
watchAd();
}

window.spin=function(){
let win=rewards[Math.floor(Math.random()*rewards.length)];
coins+=win;
update();
save();
alert("🎰 You won "+win);
}
}

// ===== REF =====
function share(){
let link=location.origin+"?ref="+userId;
alert("Invite:\n"+link);
}

// INIT
load();

</script>

</body>
</html>
