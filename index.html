 <!DOCTYPE html>
<html>
<head>
<title>Tap2Earn PRO MAX</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- 🔥 YOUR POPUP SCRIPT (IMPORTANT) -->
<script src="https://www.profitableratecpm.com/10880483.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;text-align:center;padding-bottom:80px}
.page{display:none}
.active{display:block}
.tap{width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,#ff00cc,#330066);border:none;font-size:30px;color:white}
.btn{padding:10px;margin:5px;border:none;border-radius:10px;background:#ff00cc;color:white}
.footer{position:fixed;bottom:0;width:100%;height:60px;background:#111;display:flex;justify-content:space-around}
.nav{background:none;border:none;color:#aaa}
.nav.active{color:#ff00cc}
</style>
</head>

<body>

<div id="home" class="page active">
<h2>💰 <span id="coins">0</span></h2>
<p>Level: <span id="level">1</span></p>

<button class="tap" onclick="tap()">🚀</button><br><br>

<button class="btn" onclick="watchAd()">🎁 Watch Ad</button>
<button class="btn" onclick="daily()">🎁 Daily</button>
<button class="btn" onclick="share()">📤 Invite</button>
</div>

<div id="spinPage" class="page">
<h3>🎰 Spin Wheel</h3>
<canvas id="wheel" width="260" height="260"></canvas><br><br>
<button class="btn" onclick="spinAd()">Spin (Ad)</button>
</div>

<div class="footer">
<button class="nav active" onclick="nav('home',this)">Home</button>
<button class="nav" onclick="nav('spinPage',this)">Spin</button>
</div>

<script>
window.onload = function(){

// ===== 🔥 DIRECT LINK (BACKUP AD) =====
const DIRECT_AD = "https://omg10.com/4/10880497";

// ===== FIREBASE =====
const firebaseConfig = {
  apiKey: "AIzaSyD3mNkuJEZ8DpnCuz89wToiVrE9YvC-W7E",
  authDomain: "tap2earn-4ef6d.firebaseapp.com",
  databaseURL: "https://tap2earn-4ef6d-default-rtdb.firebaseio.com/",
  projectId: "tap2earn-4ef6d",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===== USER =====
let tg = window.Telegram?.WebApp;
let userId = tg?.initDataUnsafe?.user?.id || "user_"+Math.floor(Math.random()*999999);
let ref = new URLSearchParams(location.search).get("ref");

// ===== DATA =====
let coins=0, level=1, ads=0;

// ===== UI =====
function update(){
document.getElementById("coins").innerText=coins;
document.getElementById("level").innerText=level;
}

// ===== SAVE =====
function save(){
db.ref("users/"+userId).update({coins,level,ads});
}

// ===== LOAD =====
function load(){
db.ref("users/"+userId).once("value",snap=>{
let d=snap.val();

if(!d){
db.ref("users/"+userId).set({
coins:100,
level:1,
ads:0,
lastDaily:""
});
}else{
coins=d.coins||0;
level=d.level||1;
ads=d.ads||0;
}
update();
});
}

// ===== TAP =====
window.tap=function(){
coins += (1 + level);
update();
save();
}

// ===== DAILY =====
window.daily=function(){
coins += 500;
update();
save();
alert("🎁 Daily reward");
}

// ===== 🔥 MAIN AD SYSTEM =====
window.watchAd = function(){

localStorage.setItem("ad_start", Date.now());

alert("Watch ad and come back to earn");

// TRY REWARDED POPUP FIRST
if(typeof show_10880483 === "function"){

show_10880483('pop')
.then(() => {
giveReward();
})
.catch(() => {
openDirectAd();
});

}else{
openDirectAd();
}
}

// ===== FALLBACK DIRECT LINK =====
function openDirectAd(){

if(window.Telegram && Telegram.WebApp){
Telegram.WebApp.openLink(DIRECT_AD);
}else{
window.open(DIRECT_AD, "_blank");
}
}

// ===== REWARD FUNCTION =====
function giveReward(){
let reward = Math.floor(Math.random()*200)+100;
coins += reward;
ads++;
update();
save();
alert("💰 Earned " + reward);
}

// ===== VERIFY RETURN =====
window.onfocus = function(){

let s = localStorage.getItem("ad_start");
if(!s) return;

let t = Date.now() - s;
localStorage.removeItem("ad_start");

if(t > 8000){
giveReward();
}
}

// ===== NAV =====
window.nav=function(id,btn){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// ===== SPIN =====
window.spinAd=function(){
localStorage.setItem("spin","yes");
watchAd();
}

window.spin=function(){
let rewards=[50,100,200,500];
let win=rewards[Math.floor(Math.random()*rewards.length)];
coins+=win;
update();
save();
alert("🎰 Won "+win);
}

// INIT
load();

};
</script>

</body>
</html>
