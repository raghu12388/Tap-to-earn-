 <!DOCTYPE html>
<html>
<head>
  <title>Tap2Earn ULTRA</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin:0;
      text-align:center;
      font-family:sans-serif;
      background: radial-gradient(circle,#0f0f0f,#000);
      color:white;
      overflow:hidden;
    }

    h1 {
      margin-top:20px;
      font-size:30px;
    }

    .level {
      color:#00ffcc;
      font-size:18px;
    }

    .tap-btn {
      margin-top:40px;
      width:160px;
      height:160px;
      border-radius:50%;
      font-size:26px;
      background: linear-gradient(45deg,#ff00cc,#3333ff);
      box-shadow:0 0 50px #ff00cc;
      border:none;
      color:white;
      transition:0.1s;
    }

    .tap-btn:active {
      transform:scale(0.9);
    }

    .btn {
      margin:10px;
      padding:12px 20px;
      border:none;
      border-radius:10px;
      font-size:16px;
      background:#222;
      color:white;
    }

    .coin {
      position:absolute;
      color:gold;
      font-size:20px;
      animation:float 1s linear forwards;
    }

    @keyframes float {
      from {transform:translateY(0); opacity:1;}
      to {transform:translateY(-80px); opacity:0;}
    }
  </style>
</head>

<body>

<h1>💰 <span id="coins">0</span></h1>
<div class="level">Level: <span id="level">1</span> 🔥</div>

<button class="tap-btn" onclick="tap()">🚀</button>

<br>
<button class="btn" onclick="spin()">🎡 Spin</button>
<button class="btn" onclick="share()">📲 Invite</button>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let userId = tg.initDataUnsafe?.user?.id || "demo";

let coins = 0;

// LOAD
function load() {
  let saved = localStorage.getItem(userId);
  if (saved) coins = parseInt(saved);
  updateUI();
}

// SAVE
function save() {
  localStorage.setItem(userId, coins);
}

// UPDATE UI
function updateUI() {
  document.getElementById("coins").innerText = coins;
  document.getElementById("level").innerText = Math.floor(coins/100)+1;
}

// TAP
function tap() {
  coins++;

  // floating coin animation
  let c = document.createElement("div");
  c.innerText = "+1";
  c.className = "coin";
  c.style.left = Math.random()*window.innerWidth + "px";
  c.style.top = "50%";
  document.body.appendChild(c);

  setTimeout(()=>c.remove(),1000);

  // vibration
  if (navigator.vibrate) navigator.vibrate(30);

  updateUI();
  save();

  // random reward popup
  if (Math.random() < 0.1) {
    showPopup("🔥 Lucky bonus!");
  }
}

// SPIN
function spin() {
  let reward = Math.floor(Math.random()*200);
  coins += reward;
  showPopup("🎡 You won " + reward + " coins!");
  updateUI();
  save();
}

// SHARE (VERY IMPORTANT 🔥)
function share() {
  let link = "https://t.me/tap2earn1995bot?start=" + userId;
  tg.openTelegramLink(link);
}

// POPUP
function showPopup(msg) {
  alert(msg);
}

// FAKE LIVE ACTIVITY (VIRAL PSYCHOLOGY)
setInterval(()=>{
  let names = ["Rahul","Aman","Priya","Rohit","Neha","Karan"];
  let name = names[Math.floor(Math.random()*names.length)];
  console.log(name + " earned ₹20 💸");
},4000);

// INIT
load();
</script>

</body>
</html>
