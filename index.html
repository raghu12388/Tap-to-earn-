 <!DOCTYPE html>
<html>
<head>
<title>Tap2Earn FINAL</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
  text-align:center;
  padding-bottom:80px;
}

.page{display:none;}
.activePage{display:block;}

.tap{
  width:160px;height:160px;
  border-radius:50%;
  background:radial-gradient(circle,#ff00cc,#330066);
  border:none;
  font-size:30px;
  color:white;
}

.btn{
  padding:10px 20px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#ff00cc;
  color:white;
}

.footer{
  position:fixed;
  bottom:0;
  width:100%;
  height:70px;
  background:#111;
  display:flex;
  justify-content:space-around;
}

.nav-btn{
  background:none;
  border:none;
  color:#aaa;
}
.nav-btn.active{
  color:#ff00cc;
}

.pointer{
  position:absolute;
  top:5px;
  left:50%;
  transform:translateX(-50%);
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page activePage">
  <h1>💰 <span id="coins">0</span></h1>
  <button class="tap" id="tapBtn">🚀</button><br><br>

  <button class="btn" onclick="watchAd()">🎁 Watch Ad</button>
  <p>Ads Today: <span id="adCount">0</span>/20</p>
</div>

<!-- SPIN -->
<div id="spinPage" class="page">
  <div style="position:relative">
    <div class="pointer">🔻</div>
    <canvas id="wheel" width="260" height="260"></canvas>
  </div>
  <br>
  <button class="btn" id="spinBtn">🎰 SPIN</button>
</div>

<!-- WALLET -->
<div id="walletPage" class="page">
  <h2>Balance ₹ <span id="balance">0</span></h2>
  <button class="btn" onclick="withdraw()">Withdraw</button>
</div>

<!-- FOOTER -->
<div class="footer">
  <button class="nav-btn active" onclick="nav('home',this)">Home</button>
  <button class="nav-btn" onclick="nav('spinPage',this)">Spin</button>
  <button class="nav-btn" onclick="nav('walletPage',this)">Wallet</button>
</div>

<script>
window.onload=function(){

let coins=0;

// ===== CONFIG =====
const AD_LINK="https://www.profitableratecpm.com/xxxxx";
const DAILY_LIMIT=20;
const COOLDOWN=30;

// ===== STORAGE =====
let adCount=parseInt(localStorage.getItem("ad_count"))||0;
let lastAd=parseInt(localStorage.getItem("last_ad"))||0;
let day=localStorage.getItem("day");

let today=new Date().toDateString();
if(day!==today){
  adCount=0;
  localStorage.setItem("day",today);
  localStorage.setItem("ad_count",0);
}

// ===== UI =====
function updateUI(){
  document.getElementById("coins").innerText=coins;
  document.getElementById("balance").innerText=(coins/100).toFixed(2);
  document.getElementById("adCount").innerText=adCount;
}

// ===== NAV =====
window.nav=function(id,btn){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("activePage"));
  document.getElementById(id).classList.add("activePage");

  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

// ===== TAP =====
document.getElementById("tapBtn").onclick=()=>{
  coins++;
  updateUI();
}

// ===== SAFE AD OPEN =====
function openAd(){
  if(window.Telegram && Telegram.WebApp){
    Telegram.WebApp.openLink(AD_LINK,{try_instant_view:false});
  } else {
    window.open(AD_LINK,"_blank");
  }
}

// ===== WATCH AD =====
window.watchAd=function(){

  let now=Date.now();

  if(adCount>=DAILY_LIMIT){
    alert("🚫 Limit reached");
    return;
  }

  if((now-lastAd)/1000<COOLDOWN){
    alert("⏳ Wait "+Math.ceil(COOLDOWN-(now-lastAd)/1000)+" sec");
    return;
  }

  localStorage.setItem("auto_spin","yes");

  openAd();

  adCount++;
  lastAd=now;

  localStorage.setItem("ad_count",adCount);
  localStorage.setItem("last_ad",lastAd);
}

// ===== SPIN =====
const ctx=document.getElementById("wheel").getContext("2d");

let spinning=false,angle=0;
const rewards=[50,100,150,300,500,1000];
const arc=(2*Math.PI)/rewards.length;

function draw(high=-1){
  for(let i=0;i<rewards.length;i++){
    ctx.beginPath();
    ctx.fillStyle=i==high?"gold":(i%2?"#ff00cc":"#330066");
    ctx.moveTo(130,130);
    ctx.arc(130,130,130,i*arc,(i+1)*arc);
    ctx.fill();

    ctx.save();
    ctx.translate(130,130);
    ctx.rotate(i*arc+arc/2);
    ctx.fillStyle="white";
    ctx.textAlign="center";
    ctx.fillText("💰",80,-5);
    ctx.fillText(rewards[i],80,15);
    ctx.restore();
  }
}
draw();

document.getElementById("spinBtn").onclick=()=>{
  if(spinning)return;
  watchAd();
};

// ===== AUTO RETURN =====
function checkAuto(){
  if(localStorage.getItem("auto_spin")=="yes"){
    localStorage.removeItem("auto_spin");
    setTimeout(()=>spin(),1000);
  }
}

// ===== SPIN LOGIC =====
function spin(){
  spinning=true;

  let index=Math.floor(Math.random()*rewards.length);
  let stop=(Math.PI*2)-(index*arc)-arc/2;
  let target=angle+Math.PI*6+stop;

  let start=null;

  function anim(t){
    if(!start)start=t;

    let p=(t-start)/3000;
    if(p>1)p=1;

    let ease=1-Math.pow(1-p,3);
    let cur=angle+(target-angle)*ease;

    ctx.clearRect(0,0,260,260);
    ctx.save();
    ctx.translate(130,130);
    ctx.rotate(cur);
    ctx.translate(-130,-130);
    draw();
    ctx.restore();

    if(p<1){
      requestAnimationFrame(anim);
    }else{
      angle=target%(Math.PI*2);
      finish(index);
    }
  }

  requestAnimationFrame(anim);
}

// ===== FINISH =====
function finish(index){
  spinning=false;

  let win=rewards[index];
  coins+=win;

  updateUI();

  alert("🎉 Won "+win);
}

// ===== WITHDRAW =====
window.withdraw=function(){
  if(coins<1000){
    alert("Min ₹10");
    return;
  }
  coins=0;
  updateUI();
  alert("Withdraw sent 💸");
}

// INIT
updateUI();
checkAuto();

}
</script>

</body>
</html>
