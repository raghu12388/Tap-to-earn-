 <!DOCTYPE html>
<html>
<head>
<title>Tap2Earn FINAL</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  background:black;
  color:white;
  text-align:center;
  font-family:sans-serif;
  padding-bottom:90px;
}

/* TAP BUTTON */
.tap{
  width:180px;
  height:180px;
  border-radius:50%;
  background:radial-gradient(circle,#ff00cc,#330066);
  border:none;
  color:white;
  font-size:30px;
  box-shadow:0 0 40px #ff00cc;
}

/* REWARD */
#reward{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  font-size:28px;
  opacity:0;
}

.show{
  animation:pop 1s forwards;
}

@keyframes pop{
  0%{opacity:0;}
  50%{opacity:1;}
  100%{opacity:0; transform:translate(-50%,-100px);}
}

/* FOOTER */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  height:75px;
  background:#111;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid #333;
}

.nav-btn{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:11px;
  color:#aaa;
  background:none;
  border:none;
}

.nav-btn i{
  font-size:20px;
}

.nav-btn.active{
  color:#ff00cc;
  text-shadow:0 0 10px #ff00cc;
  transform:scale(1.1);
}
</style>
</head>

<body>

<div id="reward"></div>

<h1>💰 <span id="coins">0</span></h1>
<h3>Level: <span id="level">1</span></h3>

<br><br>

<button class="tap" id="tapBtn">🚀</button>

<!-- FOOTER -->
<div class="footer">

  <button class="nav-btn active" onclick="tab(this)">
    <i class="fas fa-home"></i>
    Home
  </button>

  <button class="nav-btn" onclick="vip()">
    <i class="fas fa-gem"></i>
    VIP
  </button>

  <button class="nav-btn" onclick="autoBuy()">
    <i class="fas fa-robot"></i>
    Auto
  </button>

  <button class="nav-btn" onclick="chest()">
    <i class="fas fa-gift"></i>
    Chest
  </button>

  <button class="nav-btn" onclick="withdraw()">
    <i class="fas fa-wallet"></i>
    Cash
  </button>

  <button class="nav-btn" onclick="leader()">
    <i class="fas fa-trophy"></i>
    Rank
  </button>

  <button class="nav-btn" onclick="invite()">
    <i class="fas fa-user-plus"></i>
    Invite
  </button>

</div>

<script>

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey:"YOUR_KEY",
  authDomain:"YOUR_DOMAIN",
  projectId:"YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// USER
let userId = localStorage.getItem("userId");
if(!userId){
  userId = "user_"+Math.random().toString(36).substr(2,9);
  localStorage.setItem("userId", userId);
}

// DATA
let coins=0, auto=0, isVIP=false, lastChest=0;

// UI
function ui(){
  document.getElementById("coins").innerText = coins;
  document.getElementById("level").innerText = Math.floor(coins/200)+1;
}

// SAVE
function save(){
  db.collection("users").doc(userId).set({
    coins,auto,isVIP
  });
}

// LOAD
async function load(){
  let ref = db.collection("users").doc(userId);
  let doc = await ref.get();

  if(doc.exists){
    let d = doc.data();
    coins=d.coins||0;
    auto=d.auto||0;
    isVIP=d.isVIP||false;
  }else{
    ref.set({coins:0,auto:0,isVIP:false});
  }

  ui();
}

// REWARD
function reward(x){
  let el=document.getElementById("reward");
  el.innerText="+"+x;
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),1000);
}

// TAP
document.getElementById("tapBtn").onclick = function(){
  let gain = isVIP?2:1;
  coins += gain;
  reward(gain);
  ui();
  save();
};

// AUTO LOOP
setInterval(()=>{
  coins += auto*(isVIP?2:1);
  ui();
},1000);

// VIP
function vip(){
  if(coins<500) return alert("Need 500");
  coins -= 500;
  isVIP = true;
  save();
}

// AUTO BUY
function autoBuy(){
  if(coins<300) return alert("Need 300");
  coins -= 300;
  auto++;
  save();
}

// CHEST
function chest(){
  if(Date.now()-lastChest<60000) return alert("Wait 1 min");
  let r = Math.floor(Math.random()*300)+50;
  coins += r;
  lastChest = Date.now();
  reward(r);
  save();
}

// WITHDRAW
function withdraw(){
  let amount = coins/100;
  if(amount<10) return alert("Min ₹10");

  db.collection("withdraws").add({
    userId,amount,status:"pending"
  });

  coins=0;
  save();
  alert("Request sent 💸");
}

// LEADERBOARD
async function leader(){
  let snap = await db.collection("users")
  .orderBy("coins","desc").limit(5).get();

  let t="🏆\n";
  snap.forEach(d=>t+=d.data().coins+"\n");
  alert(t);
}

// REFERRAL
function invite(){
  let link = location.href+"?ref="+userId;
  navigator.clipboard.writeText(link);
  alert("Copied 📲");
}

// TAB
function tab(el){
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
}

// INIT
load();

</script>

</body>
</html>
