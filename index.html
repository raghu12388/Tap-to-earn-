 <!DOCTYPE html>
<html>
<head>
<title>Tap2Earn FINAL</title>

<style>
body{
margin:0;font-family:sans-serif;
background:linear-gradient(180deg,#0f0c29,#302b63,#000);
color:white;text-align:center;
}
.card{margin:15px;padding:20px;border-radius:15px;background:rgba(255,255,255,0.08)}
.tap{width:140px;height:140px;border-radius:50%;background:#ff00cc;color:white;border:none;font-size:30px}
.btn{padding:10px;margin:5px;border:none;border-radius:10px;background:#ff00cc;color:white}
.footer{position:fixed;bottom:0;width:100%;background:#000;display:flex;justify-content:space-around}
.page{display:none}
.active{display:block}

/* progress */
.progress{width:80%;height:10px;background:#333;margin:auto;border-radius:10px}
.bar{height:100%;width:0%;background:#ff00cc}
</style>
</head>

<body>

<div id="home" class="page active">

<div class="card">
<h2>💰 <span id="coins">0</span></h2>
<p>Level: <span id="level">1</span></p>

<div class="progress"><div id="bar" class="bar"></div></div>
<p>XP: <span id="xp">0</span>/<span id="need">100</span></p>
</div>

<div class="card">
<button class="tap" onclick="tap()">🚀</button>
</div>

<div class="card">
<button class="btn" onclick="watchAd()">💰 Ad</button>
<button class="btn" onclick="spin()">🎰 Spin</button>
<button class="btn" onclick="daily()">🎁 Daily</button>
<button class="btn" onclick="invite()">📤 Invite</button>
<button class="btn" onclick="claimMission()">🎯 Claim</button>
</div>

</div>

<div id="spinPage" class="page">
<div class="card">
<canvas id="wheel" width="260" height="260"></canvas>
</div>
</div>

<div id="dash" class="page">
<div class="card"><h3>Coins</h3><h2 id="dCoins">0</h2></div>
<div class="card"><h3>Ads</h3><h2 id="dAds">0</h2></div>
<canvas id="chart" width="300" height="150"></canvas>
</div>

<div class="footer">
<button onclick="nav('home')">Home</button>
<button onclick="nav('spinPage')">Spin</button>
<button onclick="nav('dash')">📊</button>
</div>

<script>

// DATA
let coins=0,level=1,xp=0,need=100;

// UPDATE
function update(){
coinsEl.innerText=coins;
levelEl.innerText=level;
xpEl.innerText=xp;
needEl.innerText=need;
bar.style.width=(xp/need*100)+"%";

dCoins.innerText=coins;
dAds.innerText=localStorage.getItem("ads")||0;
}

// XP
function addXP(v){
xp+=v;
if(xp>=need){
xp=0;level++;need+=50;
alert("Level Up!");
}
}

// TAP
function tap(){
coins++;addXP(5);update();
}

// DAILY
function daily(){
coins+=500;addXP(50);update();
}

// ADS
function watchAd(){
localStorage.setItem("ad_start",Date.now());
window.open("https://omg10.com/4/10880497");
}

// VERIFY
window.onfocus=function(){
let s=localStorage.getItem("ad_start");
if(!s)return;
if(Date.now()-s>5000){
coins+=100;addXP(20);

let a=parseInt(localStorage.getItem("ads")||0)+1;
localStorage.setItem("ads",a);

track("ad");

update();
}
}

// MISSIONS
function track(t){
let m=JSON.parse(localStorage.getItem("m")||'{"ad":0,"spin":0}');
m[t]++;localStorage.setItem("m",JSON.stringify(m));
}

function claimMission(){
let m=JSON.parse(localStorage.getItem("m")||'{"ad":0,"spin":0}');
if(m.ad>=3||m.spin>=2){
coins+=300;localStorage.removeItem("m");
alert("Mission Done!");
update();
}else alert("Not complete");
}

// INVITE
function invite(){
let link=location.href+"?ref=123";
navigator.clipboard.writeText(link);
alert("Copied!");
}

// NAV
function nav(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
if(id==="spinPage") draw();
}

// SPIN
const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");
const r=[50,100,200,300];
const arc=2*Math.PI/r.length;

function draw(){
ctx.clearRect(0,0,260,260);
for(let i=0;i<r.length;i++){
ctx.beginPath();
ctx.fillStyle=i%2?"#ff00cc":"#6a00ff";
ctx.moveTo(130,130);
ctx.arc(130,130,130,i*arc,(i+1)*arc);
ctx.fill();

ctx.save();
ctx.translate(130,130);
ctx.rotate(i*arc+arc/2);
ctx.fillStyle="white";
ctx.fillText(r[i],80,10);
ctx.restore();
}
}

function spin(){
let win=r[Math.floor(Math.random()*r.length)];
coins+=win;addXP(30);
track("spin");
update();
alert("Won "+win);
}

// GRAPH
function chart(){
let c=document.getElementById("chart").getContext("2d");
c.beginPath();
c.moveTo(0,100);
c.lineTo(50,80);
c.lineTo(100,60);
c.strokeStyle="#ff00cc";
c.stroke();
}

// INIT
let coinsEl=document.getElementById("coins");
let levelEl=document.getElementById("level");
let xpEl=document.getElementById("xp");
let needEl=document.getElementById("need");
let bar=document.getElementById("bar");
let dCoins=document.getElementById("dCoins");
let dAds=document.getElementById("dAds");

draw();chart();update();

</script>

</body>
</html>
