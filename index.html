 <!DOCTYPE html>
<html>
<head>
<title>Tap2Earn PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  text-align:center;
  background:#000;
  color:white;
  font-family:sans-serif;
}

.btn{
  margin:6px;
  padding:10px;
  background:#222;
  border:none;
  color:white;
  border-radius:8px;
}

.tap{
  width:150px;height:150px;
  border-radius:50%;
  background:#ff00cc;
  font-size:25px;
  border:none;
  color:white;
}

#game{display:none;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>🔐 Login</h2>
  <input id="email" placeholder="Email"><br><br>
  <input id="pass" type="password" placeholder="Password"><br><br>
  <button class="btn" id="signupBtn">Sign Up</button>
  <button class="btn" id="loginBtn">Login</button>
</div>

<!-- GAME -->
<div id="game">
  <h1>💰 <span id="coins">0</span></h1>

  <button class="tap" id="tapBtn">🚀</button><br>

  <button class="btn" id="vipBtn">💎 VIP</button>
  <button class="btn" id="autoBtn">🤖 Auto</button>
  <button class="btn" id="chestBtn">🎁 Chest</button>
  <button class="btn" id="withdrawBtn">💸 Withdraw</button>
  <button class="btn" id="leaderBtn">🏆 Leaderboard</button>
  <button class="btn" id="refBtn">📲 Invite</button>
</div>

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey:"YOUR_KEY",
  authDomain:"YOUR_DOMAIN",
  projectId:"YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let userId;
let coins = 0;
let auto = 0;
let isVIP = false;
let lastChest = 0;

// LOGIN
signupBtn.onclick = ()=>{
  auth.createUserWithEmailAndPassword(email.value,pass.value)
  .then(()=>alert("Account Created"))
  .catch(e=>alert(e.message));
};

loginBtn.onclick = ()=>{
  auth.signInWithEmailAndPassword(email.value,pass.value)
  .catch(e=>alert(e.message));
};

// SESSION
auth.onAuthStateChanged(async user=>{
  if(user){
    userId = user.uid;

    loginBox.style.display="none";
    game.style.display="block";

    let ref = db.collection("users").doc(userId);
    let doc = await ref.get();

    if(doc.exists){
      let d = doc.data();
      coins = d.coins||0;
      auto = d.auto||0;
      isVIP = d.isVIP||false;
    }else{
      await ref.set({coins:0,auto:0,isVIP:false});
    }

    updateUI();
  }
});

// UI
function updateUI(){
  coinsEl.innerText = coins;
}

// SAVE
function save(){
  db.collection("users").doc(userId).set({
    coins,auto,isVIP
  });
}

// TAP
tapBtn.onclick = ()=>{
  coins += isVIP?2:1;
  updateUI();
  save();
};

// AUTO BUY
autoBtn.onclick = ()=>{
  if(coins<200) return alert("Need 200");
  coins-=200;
  auto++;
  save();
};

// AUTO LOOP
setInterval(()=>{
  coins += auto*(isVIP?2:1);
  updateUI();
  save();
},1000);

// CHEST
chestBtn.onclick = ()=>{
  if(Date.now()-lastChest<60000) return alert("Wait 1 min");
  let reward = Math.floor(Math.random()*300)+50;
  coins += reward;
  lastChest = Date.now();
  alert("+"+reward);
  save();
};

// VIP
vipBtn.onclick = ()=>{
  if(coins<500) return alert("Need 500 coins");
  coins -= 500;
  isVIP = true;
  save();
};

// WITHDRAW
withdrawBtn.onclick = ()=>{
  let amount = coins/100;
  if(amount<10) return alert("Min ₹10");

  db.collection("withdraws").add({
    userId,amount,status:"pending"
  });

  coins=0;
  save();
  alert("Request Sent");
};

// LEADERBOARD
leaderBtn.onclick = async()=>{
  let snap = await db.collection("users")
  .orderBy("coins","desc").limit(5).get();

  let text="🏆\n";
  snap.forEach(d=>{
    text+=d.id+" : "+d.data().coins+"\n";
  });

  alert(text);
};

// REFERRAL
refBtn.onclick = ()=>{
  let link = location.href+"?ref="+userId;
  navigator.clipboard.writeText(link);
  alert("Link Copied 📲");
};

</script>

</body>
</html>
