 <!DOCTYPE html>
<html>
<head>
<title>Tap2Earn PRO SPIN</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(180deg,#0f0c29,#302b63,#000);
color:white;
text-align:center;
}

.card{
margin:15px;
padding:20px;
border-radius:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
}

.tap{
width:140px;height:140px;border-radius:50%;
background:radial-gradient(circle,#ff00cc,#6a00ff);
border:none;font-size:35px;color:white;
box-shadow:0 0 40px #ff00cc;
}

.btn{
padding:12px;margin:6px;border:none;border-radius:12px;
background:linear-gradient(45deg,#ff00cc,#ff6600);
color:white;font-weight:bold;
}

.footer{
position:fixed;bottom:0;width:100%;
background:#000;display:flex;justify-content:space-around;
}

.page{display:none}
.active{display:block}

/* 🎰 SPIN WRAPPER */
.spinWrap{
position:relative;
width:260px;
margin:auto;
}

/* 🎯 CENTER BUTTON */
.centerBtn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:80px;
height:80px;
border-radius:50%;
background:radial-gradient(circle,#fff,#ff00cc);
color:#000;
font-weight:bold;
border:none;
box-shadow:0 0 25px #ff00cc;
z-index:10;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page active">

<div class="card">
<h2>💰 <span id="coins">0</span></h2>
</div>

<div class="card">
<button class="tap" onclick="tap()">🚀</button>
</div>

<div class="card">
<button class="btn" onclick="watchAd()">💰 Watch Ad</button>
<button class="btn" onclick="nav('spinPage')">🎰 Spin</button>
</div>

</div>

<!-- SPIN PAGE -->
<div id="spinPage" class="page">

<div class="card">

<div class="spinWrap">

<!-- POINTER -->
<div style="
position:absolute;
top:-15px;
left:50%;
transform:translateX(-50%);
font-size:28px;">🔻</div>

<canvas id="wheel" width="260" height="260"></canvas>

<button class="centerBtn" onclick="spin()">SPIN</button>

</div>

</div>

</div>

<!-- NAV -->
<div class="footer">
<button onclick="nav('home')">Home</button>
<button onclick="nav('spinPage')">Spin</button>
</div>

<script>

// DATA
let coins=0;

// UPDATE
function update(){
document.getElementById("coins").innerText=coins;
}

// TAP
function tap(){
coins++;
update();
}

// ADS FIX (Telegram)
function watchAd(){

let link="https://omg10.com/4/10880497";

if(window.Telegram){
Telegram.WebApp.openLink(link);
}else{
window.open(link,"_blank");
}
}

// NAV
function nav(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");

if(id==="spinPage"){
setTimeout(initWheel,100);
}
}

// 🎰 SPIN SYSTEM
let canvas,ctx;
let angle=0,spinning=false;

const rewards=[50,100,200,300,500,1000];
const arc=(2*Math.PI)/rewards.length;

// INIT
function initWheel(){
canvas=document.getElementById("wheel");
if(!canvas) return;
ctx=canvas.getContext("2d");
drawWheel();
}

// DRAW 3D
function drawWheel(){

ctx.clearRect(0,0,260,260);

for(let i=0;i<rewards.length;i++){

let grad=ctx.createLinearGradient(0,0,260,260);
grad.addColorStop(0,i%2?"#ff00cc":"#6a00ff");
grad.addColorStop(1,"#000");

ctx.beginPath();
ctx.fillStyle=grad;
ctx.moveTo(130,130);
ctx.arc(130,130,130,i*arc,(i+1)*arc);
ctx.fill();

ctx.save();
ctx.translate(130,130);
ctx.rotate(i*arc+arc/2);

ctx.fillStyle="white";
ctx.fillText(rewards[i],80,5);

ctx.restore();
}
}

// ROTATE DRAW
function drawRotate(a){
ctx.save();
ctx.clearRect(0,0,260,260);

ctx.translate(130,130);
ctx.rotate(a);
ctx.translate(-130,-130);

drawWheel();

ctx.restore();
}

// SPIN
function spin(){

if(spinning || !ctx) return;
spinning=true;

let i=Math.floor(Math.random()*rewards.length);

let target=(Math.PI*2)-(i*arc)-arc/2;
let final=angle+(Math.PI*6)+target;

let start=null;

function animate(t){

if(!start) start=t;

let p=(t-start)/3000;
if(p>1)p=1;

let ease=1-Math.pow(1-p,3);
let current=angle+(final-angle)*ease;

drawRotate(current);

if(p<1){
requestAnimationFrame(animate);
}else{
angle=final%(Math.PI*2);
spinning=false;

let win=rewards[i];
coins+=win;
update();

alert("🎰 You won "+win);
}
}

requestAnimationFrame(animate);
}

// INIT
document.addEventListener("DOMContentLoaded",()=>{
update();
});

</script>

</body>
</html>
