 <!DOCTYPE html>
<html>
<head>
<title>Tap2Earn Spin PRO</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  background:black;
  color:white;
  text-align:center;
  font-family:sans-serif;
  padding-bottom:100px;
}

/* LAYOUT */
.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:15px;
  padding-top:20px;
}

/* TAP */
.tap{
  width:170px;height:170px;
  border-radius:50%;
  background:radial-gradient(circle,#ff00cc,#330066);
  border:none;
  color:white;
  font-size:28px;
  box-shadow:0 0 40px #ff00cc;
}

/* SPIN BOX */
.spin-box{
  position:relative;
}

/* POINTER */
.pointer{
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%);
  font-size:22px;
}

/* WHEEL */
#wheel{
  border-radius:50%;
  border:5px solid #333;
  box-shadow:0 0 20px #ff00cc;
}

/* BUTTON */
.spin-btn{
  margin-top:15px;
  padding:10px 25px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#ff00cc,#00ffee);
  color:white;
  font-size:16px;
}

/* TOAST */
#toast{
  position:fixed;
  bottom:110px;
  left:50%;
  transform:translateX(-50%);
  background:#222;
  padding:10px 20px;
  border-radius:10px;
  opacity:0;
}
#toast.show{opacity:1;}

/* FOOTER */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  height:75px;
  background:#111;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.nav-btn{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:11px;
  color:#aaa;
  border:none;
  background:none;
}

.nav-btn.active{
  color:#ff00cc;
  transform:scale(1.1);
}
</style>
</head>

<body>

<div id="toast"></div>

<div class="container">

<h1>💰 <span id="coins">0</span></h1>

<button class="tap" id="tapBtn">🚀</button>

<div class="spin-box">

  <div class="pointer">▼</div>

  <canvas id="wheel" width="260" height="260"></canvas>

  <button class="spin-btn" id="spinBtn">🎰 SPIN</button>

</div>

</div>

<!-- FOOTER -->
<div class="footer">
  <button class="nav-btn active">Home</button>
  <button class="nav-btn">VIP</button>
  <button class="nav-btn">Auto</button>
  <button class="nav-btn">Chest</button>
</div>

<script>

// FIREBASE
firebase.initializeApp({
  apiKey:"YOUR_KEY",
  authDomain:"YOUR_DOMAIN",
  projectId:"YOUR_PROJECT_ID"
});
const db=firebase.firestore();

// USER
let userId=localStorage.getItem("userId")||("user_"+Math.random());
localStorage.setItem("userId",userId);

// DATA
let coins=0, auto=0;

// UI
function ui(){
  document.getElementById("coins").innerText=coins;
}

// TOAST
function showToast(msg){
  let t=document.getElementById("toast");
  t.innerText=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

// SAVE
function save(){
  db.collection("users").doc(userId).set({coins});
}

// TAP
tapBtn.onclick=()=>{
  coins++;
  ui();
  save();
};

// 🎰 SPIN SYSTEM
const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");
const spinBtn=document.getElementById("spinBtn");

let spinning=false, lastSpin=0, angle=0;

const rewards=[50,100,150,300,500,1000];

// DRAW
function draw(){
  let arc=(2*Math.PI)/rewards.length;

  for(let i=0;i<rewards.length;i++){
    ctx.beginPath();
    ctx.fillStyle=rewards[i]==1000?"gold":(i%2?"#ff00cc":"#330066");
    ctx.moveTo(130,130);
    ctx.arc(130,130,130,i*arc,(i+1)*arc);
    ctx.fill();

    ctx.save();
    ctx.translate(130,130);
    ctx.rotate(i*arc+arc/2);
    ctx.fillStyle="#fff";
    ctx.fillText(rewards[i],60,5);
    ctx.restore();
  }
}

// ROTATE
function rotate(a){
  ctx.clearRect(0,0,260,260);
  ctx.save();
  ctx.translate(130,130);
  ctx.rotate(a);
  ctx.translate(-130,-130);
  draw();
  ctx.restore();
}

// SPIN BUTTON
spinBtn.onclick=()=>{

  if(spinning) return;

  if(Date.now()-lastSpin<60000){
    showToast("⏳ Wait");
    return;
  }

  spinning=true;

  let spinTime=3000;
  let start=null;
  let extra=Math.random()*Math.PI*6+Math.PI*4;
  let target=angle+extra;

  function anim(t){
    if(!start) start=t;

    let p=(t-start)/spinTime;
    if(p>1)p=1;

    let ease=1-Math.pow(1-p,3);
    let current=angle+(target-angle)*ease;

    rotate(current);

    if(p<1){
      requestAnimationFrame(anim);
    }else{
      angle=target%(Math.PI*2);
      finish();
    }
  }

  requestAnimationFrame(anim);
};

// RESULT
function finish(){
  spinning=false;
  lastSpin=Date.now();

  let win=rewards[Math.floor(Math.random()*rewards.length)];
  coins+=win;
  save();
  ui();

  if(win==1000){
    showToast("💎 JACKPOT!");
    document.body.style.background="gold";
    setTimeout(()=>document.body.style.background="black",1500);
  }else{
    showToast("🎉 "+win);
  }
}

// INIT
draw();

</script>

</body>
</html>
