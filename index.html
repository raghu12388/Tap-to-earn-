 <!DOCTYPE html>
<html>
<head>
<title>Tap2Earn SAFE</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{background:black;color:white;text-align:center;font-family:sans-serif}
.btn{padding:10px;margin:5px;background:#ff00cc;color:white;border:none;border-radius:10px}
</style>
</head>

<body>

<h1>💰 <span id="coins">0</span></h1>

<button class="btn" onclick="tap()">Tap</button>
<button class="btn" onclick="watchAd()">Watch Ad</button>
<button class="btn" onclick="dailyBonus()">Daily</button>
<button class="btn" onclick="test()">TEST</button>

<script>

// ===== SAFE START =====
let coins = 0;

// ===== TEST BUTTON =====
function test(){
  alert("✅ Button Working");
}

// ===== TAP =====
function tap(){
  coins++;
  update();
}

// ===== UPDATE =====
function update(){
  document.getElementById("coins").innerText = coins;
}

// ===== AD =====
function watchAd(){
  localStorage.setItem("ad_start", Date.now());
  window.open("https://google.com","_blank");
}

// ===== VERIFY =====
window.onfocus = function(){

  let start = localStorage.getItem("ad_start");
  if(!start) return;

  let time = Date.now() - start;
  localStorage.removeItem("ad_start");

  if(time > 3000){
    coins += 100;
    update();
    alert("Ad reward given");
  }
};

// ===== DAILY =====
function dailyBonus(){
  coins += 500;
  update();
  alert("Daily added");
}

// ===== FIREBASE SAFE INIT =====
try {

  const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    databaseURL: "YOUR_DB_URL",
    projectId: "YOUR_ID",
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  console.log("🔥 Firebase Connected");

} catch(e){
  console.log("❌ Firebase Error:", e);
}

</script>

</body>
</html>
