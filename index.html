 <!DOCTYPE html>
<html>
<head>
<title>Tap2Earn PRO APP</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
  text-align:center;
  padding-bottom:90px;
}

/* PAGES */
.page{display:none;padding-top:20px;}
.activePage{display:block;}

/* TAP */
.tap{
  width:170px;height:170px;
  border-radius:50%;
  background:radial-gradient(circle,#ff00cc,#330066);
  border:none;
  color:white;
  font-size:28px;
  box-shadow:0 0 40px #ff00cc;
}

/* SPIN */
.spin-box{position:relative;margin-top:20px;}
.pointer{
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%);
}

/* WHEEL */
#wheel{
  border-radius:50%;
  border:5px solid #333;
  box-shadow:0 0 20px #ff00cc;
}

/* BUTTON */
.btn{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#ff00cc,#00ffee);
  color:white;
}

/* WALLET */
.wallet-box{
  background:#111;
  margin:20px;
  padding:20px;
  border-radius:10px;
}

/* FOOTER */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  height:75px;
  background:#111;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.nav-btn{
  display:flex;
  flex-direction:column;
  align-items:center;
  color:#aaa;
  border:none;
  background:none;
}

.nav-btn.active{
  color:#ff00cc;
  transform:scale(1.1);
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page activePage">
  <h1>💰 <span id="coins">0</span></h1>
  <h3>Level: <span id="level">1</span></h3>
  <button class="tap" id="tapBtn">🚀</button>
</div>

<!-- SPIN -->
<div id="spinPage" class="page">
  <h2>🎰 Spin</h2>

  <div class="spin-box">
    <div class="pointer">▼</div>
    <canvas id="wheel" width="260" height="260"></canvas>
    <br>
    <button class="btn" id="spinBtn">🎰 SPIN</button>
  </div>
</div>

<!-- WALLET -->
<div id="walletPage" class="page">
  <h2>💰 Wallet</h2>

  <div class="wallet-box">
    <h3>Balance: ₹ <span id="balance">0</span></h3>
    <button class="btn" onclick="withdraw()">💸 Withdraw</button>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">

  <button class="nav-btn active" onclick="showPage('home',this)">
    <i class="fas fa-home"></i>
    Home
  </button>

  <button class="nav-btn" onclick="showPage('spinPage',this)">
    <i class="fas fa-dice"></i>
    Spin
  </button>

  <button class="nav-btn" onclick="showPage('walletPage',this)">
    <i class="fas fa-wallet"></i>
    Wallet
  </button>

</div>

<script>

// DATA
let coins = 0;

// UI
function updateUI(){
  document.getElementById("coins").innerText = coins;
  document.getElementById("level").innerText = Math.floor(coins/100)+1;
  document.getElementById("balance").innerText = (coins/100).toFixed(2);
}

// TAP
tapBtn.onclick = ()=>{
  coins++;
  updateUI();
};

// PAGE SWITCH
function showPage(id, btn){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("activePage"));
  document.getElementById(id).classList.add("activePage");

  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

// 🎰 SPIN
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let spinning=false, angle=0;

const rewards=[50,100,150,300,500,1000];

function drawWheel(){
  let arc=(2*Math.PI)/rewards.length;

  for(let i=0;i<rewards.length;i++){
    ctx.beginPath();
    ctx.fillStyle=rewards[i]==1000?"gold":(i%2?"#ff00cc":"#330066");
    ctx.moveTo(130,130);
    ctx.arc(130,130,130,i*arc,(i+1)*arc);
    ctx.fill();

    ctx.save();
    ctx.translate(130,130);
    ctx.rotate(i*arc+arc/2);
    ctx.fillStyle="#fff";
    ctx.fillText(rewards[i],60,5);
    ctx.restore();
  }
}

function rotate(a){
  ctx.clearRect(0,0,260,260);
  ctx.save();
  ctx.translate(130,130);
  ctx.rotate(a);
  ctx.translate(-130,-130);
  drawWheel();
  ctx.restore();
}

spinBtn.onclick = ()=>{
  if(spinning) return;

  spinning=true;

  let target=angle+Math.random()*Math.PI*6+Math.PI*4;
  let start=null;

  function anim(t){
    if(!start) start=t;

    let p=(t-start)/3000;
    if(p>1)p=1;

    let current=angle+(target-angle)*p;

    rotate(current);

    if(p<1){
      requestAnimationFrame(anim);
    } else {
      angle=target%(Math.PI*2);
      finish();
    }
  }

  requestAnimationFrame(anim);
};

function finish(){
  spinning=false;

  let win=rewards[Math.floor(Math.random()*rewards.length)];
  coins+=win;
  updateUI();

  alert("🎉 Won "+win);
}

// WITHDRAW
function withdraw(){
  let amount = coins/100;

  if(amount < 10){
    alert("Minimum ₹10 required");
    return;
  }

  coins = 0;
  updateUI();

  alert("Withdraw request sent 💸");
}

// INIT
drawWheel();
updateUI();

</script>

</body>
</html>
