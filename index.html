 <!DOCTYPE html>
<html>
<head>
<title>Tap2Earn PRO STABLE</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://www.profitableratecpm.com/10880483.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:white;
text-align:center;
padding-bottom:80px;
}
.page{display:none}
.active{display:block}

.header{padding:15px;font-size:20px;background:rgba(255,255,255,0.05)}
.card{margin:15px;padding:20px;border-radius:15px;background:rgba(255,255,255,0.08)}

.tap{
width:140px;height:140px;border-radius:50%;
background:radial-gradient(circle,#ff00cc,#330066);
border:none;font-size:30px;color:white;
}

.btn{padding:12px;margin:5px;border:none;border-radius:10px;background:#ff00cc;color:white}

.footer{
position:fixed;bottom:0;width:100%;
background:#111;display:flex;justify-content:space-around;
}

.nav{background:none;border:none;color:#aaa}
.nav.active{color:#ff00cc}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page active">
<div class="header">💰 Tap2Earn PRO</div>

<div class="card">
<h2 id="coins">0 💰</h2>
<p>Level: <span id="level">1</span></p>
</div>

<div class="card">
<button class="tap" onclick="tap()">🚀</button>
</div>

<div class="card">
<button class="btn" onclick="watchAd()">Watch Ad</button>
<button class="btn" onclick="daily()">Daily</button>
</div>
</div>

<!-- SPIN -->
<div id="spinPage" class="page">
<div class="header">🎰 Spin</div>

<div class="card" style="position:relative">
<div style="position:absolute;top:-10px;left:50%;transform:translateX(-50%)">🔻</div>
<canvas id="wheel" width="260" height="260"></canvas>
</div>

<button class="btn" onclick="spinAd()">Spin</button>
</div>

<!-- NAV -->
<div class="footer">
<button class="nav active" onclick="nav('home',this)">Home</button>
<button class="nav" onclick="nav('spinPage',this)">Spin</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

// ===== CONFIG =====
const AD_LINK = "https://omg10.com/4/10880497";

// ===== FIREBASE =====
firebase.initializeApp({
apiKey:"AIzaSyD3mNkuJEZ8DpnCuz89wToiVrE9YvC-W7E",
authDomain:"tap2earn-4ef6d.firebaseapp.com",
databaseURL:"https://tap2earn-4ef6d-default-rtdb.firebaseio.com/",
projectId:"tap2earn-4ef6d"
});
const db = firebase.database();

// ===== USER =====
let userId = "user_" + Math.floor(Math.random()*999999);

// ===== DATA =====
let coins = 0;
let level = 1;

// ===== UI =====
function update(){
document.getElementById("coins").innerText = coins + " 💰";
document.getElementById("level").innerText = level;
}

// ===== LOAD =====
function load(){
db.ref("users/"+userId).once("value",snap=>{
let d=snap.val();
if(d){
coins=d.coins||0;
level=d.level||1;
}else{
db.ref("users/"+userId).set({coins:100,level:1});
}
update();
});
}

// ===== SAVE =====
function save(){
db.ref("users/"+userId).update({coins,level});
}

// ===== TAP =====
window.tap = function(){
coins++;
update();
save();
}

// ===== DAILY =====
window.daily = function(){
coins += 500;
update();
save();
alert("Daily Reward");
}

// ===== ADS =====
window.watchAd = function(){
localStorage.setItem("ad_start", Date.now());

if(typeof show_10880483 === "function"){
show_10880483('pop')
.then(()=>reward())
.catch(()=>openAd());
}else{
openAd();
}
}

function openAd(){
if(window.Telegram && Telegram.WebApp){
Telegram.WebApp.openLink(AD_LINK);
}else{
window.open(AD_LINK,"_blank");
}
}

function reward(){
let r = Math.floor(Math.random()*200)+100;
coins += r;
update();
save();
alert("Earned " + r);
}

// VERIFY RETURN
window.onfocus = function(){
let s = localStorage.getItem("ad_start");
if(!s) return;

let t = Date.now()-s;
localStorage.removeItem("ad_start");

if(t>6000) reward();
}

// ===== NAV =====
window.nav = function(id,btn){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// ===== 🎰 SPIN SYSTEM =====
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const rewards = [50,100,200,300,500];
const arc = (2*Math.PI)/rewards.length;

let angle = 0;
let spinning = false;

function draw(){
ctx.clearRect(0,0,260,260);
for(let i=0;i<rewards.length;i++){
ctx.beginPath();
ctx.fillStyle=i%2?"#ff00cc":"#330066";
ctx.moveTo(130,130);
ctx.arc(130,130,130,i*arc,(i+1)*arc);
ctx.fill();

ctx.save();
ctx.translate(130,130);
ctx.rotate(i*arc+arc/2);
ctx.fillStyle="white";
ctx.fillText(rewards[i],80,10);
ctx.restore();
}
}
draw();

window.spin = function(){
if(spinning) return;
spinning=true;

let i=Math.floor(Math.random()*rewards.length);
let target=(Math.PI*2)-(i*arc)-arc/2;
let final=angle+Math.PI*4+target;

let start=null;

function animate(t){
if(!start) start=t;
let p=(t-start)/2000;
if(p>1)p=1;

let current=angle+(final-angle)*(1-Math.pow(1-p,3));

ctx.clearRect(0,0,260,260);
ctx.save();
ctx.translate(130,130);
ctx.rotate(current);
ctx.translate(-130,-130);
draw();
ctx.restore();

if(p<1){
requestAnimationFrame(animate);
}else{
angle=final%(Math.PI*2);
finish(i);
}
}
requestAnimationFrame(animate);
}

function finish(i){
spinning=false;
let win=rewards[i];
coins+=win;
update();
save();
alert("Won "+win);
}

window.spinAd = function(){
localStorage.setItem("spin","yes");
watchAd();
}

// INIT
load();

});
</script>

</body>
</html>
