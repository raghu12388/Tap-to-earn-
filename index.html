 <!DOCTYPE html>
<html>
<head>
  <title>Tap2Earn ULTIMATE</title>

  <!-- Telegram -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Firebase -->
  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {
    getFirestore, doc, setDoc, getDoc, updateDoc, increment,
    collection, query, orderBy, limit, getDocs
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.db = db;
  window.firebaseFunctions = { doc, setDoc, getDoc, updateDoc, increment, collection, query, orderBy, limit, getDocs };
  </script>

  <style>
    body {
      margin:0;
      text-align:center;
      font-family:sans-serif;
      color:white;
      overflow:hidden;

      background: linear-gradient(-45deg,#0f0f0f,#1a0033,#000,#001a33);
      background-size:400% 400%;
      animation:gradientBG 10s infinite;
    }

    @keyframes gradientBG {
      0% {background-position:0% 50%;}
      50% {background-position:100% 50%;}
      100% {background-position:0% 50%;}
    }

    body::after {
      content:"";
      position:fixed;
      width:100%;
      height:100%;
      background: radial-gradient(circle, rgba(255,0,255,0.15), transparent);
      animation:glow 4s infinite alternate;
    }

    @keyframes glow {
      from {opacity:0.2;}
      to {opacity:0.6;}
    }

    .tap-btn {
      margin-top:40px;
      width:160px;
      height:160px;
      border-radius:50%;
      background:linear-gradient(45deg,#ff00cc,#3333ff);
      color:white;
      font-size:24px;
      border:none;
      animation:pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% {box-shadow:0 0 10px #ff00cc;}
      50% {box-shadow:0 0 40px #ff00cc;}
      100% {box-shadow:0 0 10px #ff00cc;}
    }

    .btn {
      margin:6px;
      padding:10px;
      background:#222;
      color:white;
      border:none;
      border-radius:8px;
    }

    #particles span {
      position:absolute;
      width:4px;
      height:4px;
      background:white;
      animation:move 10s linear infinite;
    }

    @keyframes move {
      from {transform:translateY(100vh);}
      to {transform:translateY(-10vh);}
    }
  </style>
</head>

<body>

<div id="particles"></div>

<h1>💰 <span id="coins">0</span></h1>
<h3>Level: <span id="level">1</span> 🔥</h3>

<button class="tap-btn" onclick="tap()">🚀</button>

<br>
<button class="btn" onclick="spin()">🎡</button>
<button class="btn" onclick="buyAuto()">⚡</button>
<button class="btn" onclick="dailyBonus()">🎁</button>
<button class="btn" onclick="withdraw()">💸</button>
<button class="btn" onclick="share()">📲</button>
<button class="btn" onclick="showLeaderboard()">🏆</button>

<script type="module">

const tg = window.Telegram.WebApp;
tg.expand();

const { doc, setDoc, getDoc, updateDoc, increment,
        collection, query, orderBy, limit, getDocs } = window.firebaseFunctions;

const db = window.db;

let userId = tg.initDataUnsafe?.user?.id?.toString() || "demo";

// referral
const params = new URLSearchParams(window.location.search);
const ref = params.get("start");

let coins = 0;
let autoTap = 0;

// sounds
const tapSound = new Audio("https://www.soundjay.com/button/sounds/button-16.mp3");

// particles
for(let i=0;i<40;i++){
  let p=document.createElement("span");
  p.style.left=Math.random()*100+"%";
  p.style.animationDuration=(5+Math.random()*5)+"s";
  document.getElementById("particles").appendChild(p);
}

// load
async function load(){
  let refDoc = doc(db,"users",userId);
  let snap = await getDoc(refDoc);

  if(snap.exists()){
    coins = snap.data().coins || 0;
    autoTap = snap.data().autoTap || 0;
  } else {
    await setDoc(refDoc,{coins:0,autoTap:0});
  }

  // referral reward
  if(ref && ref !== userId){
    let refUser = doc(db,"users",ref);
    await updateDoc(refUser,{coins:increment(50)});
  }

  updateUI();
}

// save
async function save(){
  await setDoc(doc(db,"users",userId),{
    coins,autoTap,updatedAt:Date.now()
  });
}

// UI
function updateUI(){
  document.getElementById("coins").innerText = coins;
  document.getElementById("level").innerText = Math.floor(coins/100)+1;
}

// tap
window.tap = function(){
  coins++;
  tapSound.play();
  updateUI();
  save();
}

// auto
window.buyAuto = function(){
  if(coins<200) return alert("Need 200");
  coins-=200;
  autoTap++;
  save();
}

// spin
window.spin = function(){
  let r=Math.floor(Math.random()*200);
  coins+=r;
  alert("Won "+r);
  save();
  updateUI();
}

// bonus
window.dailyBonus = function(){
  coins+=100;
  alert("+100");
  save();
  updateUI();
}

// withdraw
window.withdraw = function(){
  if(coins<1000) return alert("Min 1000");
  alert("Request sent");
  coins=0;
  save();
  updateUI();
}

// share
window.share = function(){
  let link="https://t.me/tap2earn1995bot?start="+userId;
  tg.openTelegramLink(link);
}

// leaderboard
window.showLeaderboard = async function(){
  let q=query(collection(db,"users"),orderBy("coins","desc"),limit(5));
  let snap=await getDocs(q);

  let text="🏆 TOP:\n";
  let i=1;
  snap.forEach(d=>{
    text+=i+". "+d.id+" - "+d.data().coins+"\n";
    i++;
  });

  alert(text);
}

// auto loop
setInterval(()=>{
  coins+=autoTap;
  updateUI();
  save();
},1000);

load();

</script>

</body>
</html>
