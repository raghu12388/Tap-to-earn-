 <!DOCTYPE html>
<html>
<head>
<title>Tap2Earn PRO</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
  margin:0;
  text-align:center;
  font-family:sans-serif;
  color:white;
  overflow:hidden;
  background:linear-gradient(-45deg,#0f0f0f,#1a0033,#000,#001a33);
  background-size:400% 400%;
  animation:bg 10s infinite;
}

@keyframes bg{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.tap{
  width:150px;height:150px;
  border-radius:50%;
  font-size:25px;
  background:linear-gradient(45deg,#ff00cc,#3333ff);
  animation:pulse 1.5s infinite;
  border:none;color:white;
}

@keyframes pulse{
  0%{box-shadow:0 0 10px #ff00cc;}
  50%{box-shadow:0 0 40px #ff00cc;}
  100%{box-shadow:0 0 10px #ff00cc;}
}

.btn{
  margin:5px;
  padding:10px;
  background:#222;
  border:none;
  color:white;
  border-radius:8px;
}

#reward{
  position:fixed;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:28px;
  color:gold;
  opacity:0;
}

.show{
  animation:pop 1s forwards;
}

@keyframes pop{
  0%{opacity:0; transform:translate(-50%,0);}
  50%{opacity:1; transform:translate(-50%,-30px);}
  100%{opacity:0; transform:translate(-50%,-80px);}
}
</style>
</head>

<body>

<div id="reward"></div>

<h1>💰 <span id="coins">0</span></h1>
<h3>Level: <span id="level">1</span> 🔥</h3>

<button class="tap" onclick="tap()">🚀</button>

<br>

<button class="btn" onclick="spin()">🎡</button>
<button class="btn" onclick="openChest()">🎁</button>
<button class="btn" onclick="activateBoost()">⚡</button>
<button class="btn" onclick="buyAuto()">🤖</button>
<button class="btn" onclick="share()">📲</button>
<button class="btn" onclick="leaderboard()">🏆</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, increment, collection, query, orderBy, limit, getDocs } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"YOUR_KEY",
  authDomain:"YOUR_DOMAIN",
  projectId:"YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const tg = window.Telegram.WebApp;
tg.expand();

let userId = tg.initDataUnsafe?.user?.id?.toString() || "demo";

let coins=0;
let auto=0;
let boost=1;
let boostEnd=0;
let lastChest=0;

// UI
function ui(){
  document.getElementById("coins").innerText=coins;
  document.getElementById("level").innerText=Math.floor(coins/100)+1;
}

// reward anim
function reward(x){
  let el=document.getElementById("reward");
  el.innerText="+"+x;
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),1000);
}

// load
async function load(){
  let ref=doc(db,"users",userId);
  let snap=await getDoc(ref);

  if(snap.exists()){
    coins=Number(snap.data().coins)||0;
    auto=snap.data().auto||0;
  }else{
    await setDoc(ref,{coins:0,auto:0});
  }

  ui();
}

// save
async function save(){
  await setDoc(doc(db,"users",userId),{
    coins,auto
  });
}

// tap
window.tap=()=>{
  let gain=1*boost;
  coins+=gain;
  reward(gain);
  ui();
  save();
}

// auto
window.buyAuto=()=>{
  if(coins<200) return reward("❌");
  coins-=200;
  auto++;
  save();
}

// spin
window.spin=()=>{
  let r=Math.floor(Math.random()*200);
  coins+=r;
  reward(r);
  ui();
  save();
}

// chest
window.openChest=()=>{
  if(Date.now()-lastChest<60000) return reward("⏳");

  let r=Math.floor(Math.random()*500)+50;
  coins+=r;
  lastChest=Date.now();

  reward(r);
  ui();
  save();
}

// boost
window.activateBoost=()=>{
  if(coins<300) return reward("❌");

  coins-=300;
  boost=2;
  boostEnd=Date.now()+30000;

  reward("2X");
  ui();
  save();
}

// auto loop
setInterval(()=>{
  coins+=auto*boost;
  ui();
  save();
},1000);

// reset boost
setInterval(()=>{
  if(Date.now()>boostEnd) boost=1;
},1000);

// share
window.share=()=>{
  let link="https://t.me/tap2earn1995bot?start="+userId;
  tg.openTelegramLink(link);
}

// leaderboard
window.leaderboard=async()=>{
  let q=query(collection(db,"users"),orderBy("coins","desc"),limit(5));
  let snap=await getDocs(q);

  let text="🏆\n";
  let i=1;

  snap.forEach(d=>{
    text+=i+". "+d.id+" - "+d.data().coins+"\n";
    i++;
  });

  alert(text);
}

load();

</script>

</body>
</html>
