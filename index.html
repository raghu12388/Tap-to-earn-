 <!DOCTYPE html>
<html>
<head>
<title>Tap2Earn MONEY MACHINE</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
  text-align:center;
  padding-bottom:80px;
}

.page{display:none;padding-top:20px;}
.activePage{display:block;}

.tap{
  width:160px;height:160px;
  border-radius:50%;
  background:radial-gradient(circle,#ff00cc,#330066);
  border:none;
  font-size:30px;
  color:white;
}

.btn{
  padding:10px 20px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#ff00cc;
  color:white;
}

.footer{
  position:fixed;
  bottom:0;
  width:100%;
  height:70px;
  background:#111;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.nav-btn{
  background:none;
  border:none;
  color:#aaa;
}
.nav-btn.active{
  color:#ff00cc;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page activePage">
  <h1>💰 <span id="coins">0</span></h1>
  <button class="tap" id="tapBtn">🚀</button><br><br>

  <button class="btn" onclick="watchAd()">🎁 Watch Ad & Earn</button>
</div>

<!-- SPIN -->
<div id="spinPage" class="page">
  <canvas id="wheel" width="260" height="260"></canvas><br>
  <button class="btn" id="spinBtn">🎰 SPIN</button>
</div>

<!-- WALLET -->
<div id="walletPage" class="page">
  <h2>Balance ₹ <span id="balance">0</span></h2>
  <button class="btn" onclick="withdraw()">Withdraw</button>

  <br><br>

  <h3>Invite & Earn</h3>
  <button class="btn" onclick="copyInvite()">Copy Link</button>
</div>

<!-- FOOTER -->
<div class="footer">
  <button class="nav-btn active" onclick="nav('home',this)">Home</button>
  <button class="nav-btn" onclick="nav('spinPage',this)">Spin</button>
  <button class="nav-btn" onclick="nav('walletPage',this)">Wallet</button>
</div>

<script>
window.onload = function(){

let coins = 0;

// ===== UI =====
function updateUI(){
  document.getElementById("coins").innerText = coins;
  document.getElementById("balance").innerText = (coins/100).toFixed(2);
}

// ===== NAV =====
window.nav = function(id,btn){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("activePage"));
  document.getElementById(id).classList.add("activePage");

  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

// ===== TAP =====
document.getElementById("tapBtn").onclick = function(){
  coins++;
  updateUI();
}

// ===== ADS (TELEGRAM SAFE) =====
const AD_LINK = "https://www.profitableratecpm.com/xxxxx";

function openAd(){
  if(window.Telegram && Telegram.WebApp){
    Telegram.WebApp.openLink(AD_LINK);
  } else {
    window.location.href = AD_LINK;
  }
}

window.watchAd = function(){
  openAd();

  setTimeout(()=>{
    coins += 200;
    updateUI();
    alert("🎁 +200 Coins");
  },4000);
}

// ===== SPIN =====
const ctx = document.getElementById("wheel").getContext("2d");
let spinning=false, angle=0;
const rewards=[50,100,150,300,500,1000];

function draw(){
  let arc=(2*Math.PI)/rewards.length;
  for(let i=0;i<rewards.length;i++){
    ctx.beginPath();
    ctx.fillStyle=i%2?"#ff00cc":"#330066";
    ctx.moveTo(130,130);
    ctx.arc(130,130,130,i*arc,(i+1)*arc);
    ctx.fill();
  }
}
draw();

document.getElementById("spinBtn").onclick = function(){

  if(spinning) return;
  spinning = true;

  openAd(); // 🔥 earn per spin

  setTimeout(()=>{

    let index = Math.floor(Math.random()*rewards.length);
    let win = rewards[index];

    coins += win;
    updateUI();

    spinning=false;

    alert("🎉 Won "+win);

  },4000);
}

// ===== WITHDRAW =====
window.withdraw = function(){
  if(coins < 1000){
    alert("Min ₹10");
    return;
  }

  coins = 0;
  updateUI();

  alert("Withdraw sent 💸");
}

// ===== REFERRAL =====
let uid = localStorage.getItem("uid");
if(!uid){
  uid = "u_"+Math.random().toString(36).substr(2,9);
  localStorage.setItem("uid",uid);
}

window.copyInvite = function(){
  let link = location.origin + location.pathname + "?ref=" + uid;
  navigator.clipboard.writeText(link);
  alert("Link Copied 🔗");
}

function applyRef(){
  let p = new URLSearchParams(location.search);
  let ref = p.get("ref");

  if(ref && ref !== uid && !localStorage.getItem("ref_done")){
    coins += 300;
    localStorage.setItem("ref_done","yes");
    updateUI();
    alert("🎁 Referral Bonus +300");
  }
}
applyRef();

updateUI();

}
</script>

</body>
</html>
