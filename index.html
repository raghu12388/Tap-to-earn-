 <!DOCTYPE html>
<html>
<head>
<title>Tap2Earn PRO Firebase</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"></script>

<style>
body{
  margin:0;background:black;color:white;
  font-family:sans-serif;text-align:center;padding-bottom:80px;
}
.page{display:none;}
.activePage{display:block;}

.tap{
  width:160px;height:160px;border-radius:50%;
  background:radial-gradient(circle,#ff00cc,#330066);
  border:none;font-size:30px;color:white;
}

.btn{
  padding:10px 20px;margin:5px;
  border:none;border-radius:10px;
  background:#ff00cc;color:white;
}

.footer{
  position:fixed;bottom:0;width:100%;
  height:70px;background:#111;
  display:flex;justify-content:space-around;align-items:center;
}

.nav-btn{background:none;border:none;color:#aaa;}
.nav-btn.active{color:#ff00cc;}
</style>
</head>

<body>

<div id="home" class="page activePage">
  <h1>💰 <span id="coins">0</span></h1>
  <button class="tap" id="tapBtn">🚀</button><br><br>

  <button class="btn" onclick="watchAd()">🎁 Watch Ad</button>
  <button class="btn" onclick="share()">📤 Invite</button>

  <p>Ads Today: <span id="adCount">0</span></p>
</div>

<div id="walletPage" class="page">
  <h2>Balance ₹ <span id="balance">0</span></h2>
  <button class="btn" onclick="withdraw()">Withdraw</button>
</div>

<div class="footer">
  <button class="nav-btn active" onclick="nav('home',this)">Home</button>
  <button class="nav-btn" onclick="nav('walletPage',this)">Wallet</button>
</div>

<script>

// 🔥 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_ID",
};

// INIT
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===== CONFIG =====
const AD_LINK = "https://your-direct-link.com";
const MIN_TIME = 8000;

// ===== USER =====
const tgUser = Telegram.WebApp.initDataUnsafe?.user || {};
const userId = tgUser.id || "user_" + Math.floor(Math.random()*999999);

// REFERRAL
const ref = new URLSearchParams(window.location.search).get("ref");

// ===== DATA =====
let coins = 0;
let adCount = 0;
let lastAdTime = 0;

// ===== CREATE USER =====
async function createUser(){

  const userRef = db.ref("users/" + userId);
  const snap = await userRef.get();

  if(!snap.exists()){

    let bonus = 0;

    if(ref && ref !== userId){
      bonus = 500;

      db.ref("users/" + ref + "/coins")
        .transaction(c => (c || 0) + 500);
    }

    await userRef.set({
      coins: 100 + bonus,
      ads: 0,
      referredBy: ref || null
    });
  }
}

// ===== LISTEN =====
function listenUser(){

  db.ref("users/" + userId).on("value", snap => {

    let data = snap.val() || {};

    coins = data.coins || 0;
    adCount = data.ads || 0;

    updateUI();
  });
}

// ===== SAVE =====
function saveUser(){
  db.ref("users/" + userId).update({
    coins: coins,
    ads: adCount
  });
}

// ===== UI =====
function updateUI(){
  document.getElementById("coins").innerText = coins;
  document.getElementById("balance").innerText = (coins/100).toFixed(2);
  document.getElementById("adCount").innerText = adCount;
}

// ===== NAV =====
function nav(id,btn){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("activePage"));
  document.getElementById(id).classList.add("activePage");

  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

// ===== TAP =====
document.getElementById("tapBtn").onclick = ()=>{
  coins++;
  saveUser();
};

// ===== AD =====
function watchAd(){

  let now = Date.now();

  if(now - lastAdTime < 15000){
    alert("⏳ Wait...");
    return;
  }

  lastAdTime = now;
  localStorage.setItem("ad_start", now);

  if(window.Telegram){
    Telegram.WebApp.openLink(AD_LINK);
  } else {
    window.open(AD_LINK,"_blank");
  }
}

// ===== VERIFY =====
window.onfocus = function(){

  let start = parseInt(localStorage.getItem("ad_start"));
  if(!start) return;

  let stay = Date.now() - start;
  localStorage.removeItem("ad_start");

  if(stay >= MIN_TIME){

    let reward = Math.floor(Math.random()*200)+100;

    coins += reward;
    adCount++;

    saveUser();

    alert("✅ Earned +" + reward);

  } else {
    alert("❌ Stay longer");
  }
};

// ===== REF LINK =====
function share(){

  let link = window.location.origin + "?ref=" + userId;

  let text = "🔥 Earn money 💰\n" + link;

  if(window.Telegram){
    Telegram.WebApp.openTelegramLink(
      "https://t.me/share/url?url=" + encodeURIComponent(link) +
      "&text=" + encodeURIComponent(text)
    );
  } else {
    alert(link);
  }
}

// ===== WITHDRAW =====
function withdraw(){

  if(coins < 1000){
    alert("Min ₹10");
    return;
  }

  alert("Send to admin manually (next upgrade 🔥)");
}

// INIT
createUser();
listenUser();

</script>

</body>
</html>
