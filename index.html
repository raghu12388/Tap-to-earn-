 <!DOCTYPE html>
<html>
<head>
<title>Tap2Earn PRO</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
  text-align:center;
  padding-bottom:80px;
}

.page{display:none;}
.activePage{display:block;}

.tap{
  width:160px;height:160px;
  border-radius:50%;
  background:radial-gradient(circle,#ff00cc,#330066);
  border:none;
  font-size:30px;
  color:white;
}

.btn{
  padding:10px 20px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#ff00cc;
  color:white;
}

.footer{
  position:fixed;
  bottom:0;
  width:100%;
  height:70px;
  background:#111;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.nav-btn{
  color:#aaa;
  background:none;
  border:none;
}
.nav-btn.active{
  color:#ff00cc;
}

/* POINTER */
.pointer{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  font-size:30px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page activePage">
  <h1>💰 <span id="coins">0</span></h1>
  <button class="tap" id="tapBtn">🚀</button><br><br>
  <button class="btn" onclick="watchAd()">🎁 Watch Ad</button>
</div>

<!-- SPIN -->
<div id="spinPage" class="page">
  <div style="position:relative">
    <div class="pointer">🔻</div>
    <canvas id="wheel" width="260" height="260"></canvas>
  </div>
  <br>
  <button class="btn" id="spinBtn">🎰 SPIN</button>
</div>

<!-- FOOTER -->
<div class="footer">
  <button class="nav-btn active" onclick="nav('home',this)">Home</button>
  <button class="nav-btn" onclick="nav('spinPage',this)">Spin</button>
</div>

<script>
window.onload=function(){

let coins=0;

// UI
function updateUI(){
  document.getElementById("coins").innerText=coins;
}

// NAV
window.nav=function(id,btn){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("activePage"));
  document.getElementById(id).classList.add("activePage");

  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

// TAP
document.getElementById("tapBtn").onclick=()=>{
  coins++;
  updateUI();
}

// ===== ADS =====
const AD_LINK="https://www.profitableratecpm.com/xxxxx";

function openAd(){
  if(window.Telegram && Telegram.WebApp){
    Telegram.WebApp.openLink(AD_LINK);
  } else {
    window.location.href=AD_LINK;
  }
}

window.watchAd=function(){
  openAd();
  setTimeout(()=>{
    coins+=200;
    updateUI();
    alert("🎁 +200");
  },4000);
}

// ===== SOUND =====
const tickSound=new Audio("https://actions.google.com/sounds/v1/foley/click.ogg");
const winSound=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

// ===== SPIN =====
const ctx=document.getElementById("wheel").getContext("2d");

let spinning=false;
let angle=0;

const rewards=[50,100,150,300,500,1000];
const arc=(2*Math.PI)/rewards.length;

function draw(highlightIndex=-1){
  for(let i=0;i<rewards.length;i++){

    ctx.beginPath();
    ctx.fillStyle=i==highlightIndex?"gold":(i%2?"#ff00cc":"#330066");
    ctx.moveTo(130,130);
    ctx.arc(130,130,130,i*arc,(i+1)*arc);
    ctx.fill();

    // TEXT
    ctx.save();
    ctx.translate(130,130);
    ctx.rotate(i*arc+arc/2);

    ctx.fillStyle="white";
    ctx.font="bold 16px sans-serif";
    ctx.textAlign="center";

    ctx.fillText("💰",80,-5);
    ctx.fillText(rewards[i],80,15);

    ctx.restore();
  }
}
draw();

document.getElementById("spinBtn").onclick=()=>{

  if(spinning)return;
  spinning=true;

  openAd(); // 💰 earn

  let index=Math.floor(Math.random()*rewards.length);
  let stopAngle=(Math.PI*2)-(index*arc)-arc/2;

  let target=angle+Math.PI*6+stopAngle;

  let start=null;

  function anim(t){
    if(!start)start=t;

    let p=(t-start)/3000;
    if(p>1)p=1;

    let ease=1-Math.pow(1-p,3);
    let cur=angle+(target-angle)*ease;

    ctx.clearRect(0,0,260,260);
    ctx.save();
    ctx.translate(130,130);
    ctx.rotate(cur);
    ctx.translate(-130,-130);
    draw();
    ctx.restore();

    // 🔊 tick sound
    if(Math.random()<0.1) tickSound.play();

    if(p<1){
      requestAnimationFrame(anim);
    }else{
      angle=target%(Math.PI*2);
      finish(index);
    }
  }

  requestAnimationFrame(anim);
};

function finish(index){
  spinning=false;

  let win=rewards[index];
  coins+=win;

  winSound.play();

  // 💡 highlight
  ctx.clearRect(0,0,260,260);
  draw(index);

  updateUI();

  alert("🎉 "+win);
}

updateUI();

}
</script>

</body>
</html>
