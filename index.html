 <!DOCTYPE html>
<html>
<head>
<title>Tap2Earn MONEY MACHINE</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
  text-align:center;
  padding-bottom:90px;
}

/* PAGES */
.page{display:none;padding-top:20px;}
.activePage{display:block;}

/* TAP */
.tap{
  width:170px;height:170px;
  border-radius:50%;
  background:radial-gradient(circle,#ff00cc,#330066);
  border:none;
  font-size:28px;
  color:white;
  box-shadow:0 0 40px #ff00cc;
}

/* SPIN */
.spin-box{position:relative;}
.pointer{
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%);
}
#wheel{
  border-radius:50%;
  border:5px solid #333;
  box-shadow:0 0 20px #ff00cc;
}

/* BUTTON */
.btn{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#ff00cc,#00ffee);
  color:white;
}

/* WALLET */
.wallet-box{
  background:#111;
  margin:20px;
  padding:20px;
  border-radius:10px;
}

/* FOOTER */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  height:75px;
  background:#111;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.nav-btn{
  color:#aaa;
  background:none;
  border:none;
  font-size:12px;
}

.nav-btn.active{
  color:#ff00cc;
}

/* CONFETTI */
#confettiCanvas{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
}

/* WIN POPUP */
#winPopup{
  position:fixed;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.5);
  background:#ff00cc;
  padding:15px 30px;
  border-radius:15px;
  opacity:0;
  transition:0.3s;
}
#winPopup.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}
</style>
</head>

<body>

<canvas id="confettiCanvas"></canvas>
<div id="winPopup"></div>

<!-- HOME -->
<div id="home" class="page activePage">
  <h1>💰 <span id="coins">0</span></h1>
  <button class="tap" id="tapBtn">🚀</button>
</div>

<!-- SPIN -->
<div id="spinPage" class="page">
  <div class="spin-box">
    <div class="pointer">▼</div>
    <canvas id="wheel" width="260" height="260"></canvas>
    <br>
    <button class="btn" id="spinBtn">🎰 SPIN</button>
  </div>
</div>

<!-- WALLET -->
<div id="walletPage" class="page">
  <div class="wallet-box">
    <h3>Balance ₹ <span id="balance">0</span></h3>
    <button class="btn" onclick="withdraw()">Withdraw</button>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  <button class="nav-btn active" onclick="nav('home',this)">Home</button>
  <button class="nav-btn" onclick="nav('spinPage',this)">Spin</button>
  <button class="nav-btn" onclick="nav('walletPage',this)">Wallet</button>
</div>

<script>

// DATA
let coins=0;

// UI
function updateUI(){
  coinsEl.innerText=coins;
  balance.innerText=(coins/100).toFixed(2);
}

// NAV
function nav(id,btn){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("activePage"));
  document.getElementById(id).classList.add("activePage");

  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

// SOUND
const tapSound=new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
const spinSound=new Audio("https://actions.google.com/sounds/v1/cartoon/slide_whistle.ogg");
const winSound=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

function play(s){s.currentTime=0;s.play().catch(()=>{});}
function vibrate(x){navigator.vibrate && navigator.vibrate(x);}

// TAP
tapBtn.onclick=()=>{
  coins++;
  play(tapSound);
  vibrate(30);
  updateUI();
};

// 🎰 SPIN
const ctx=wheel.getContext("2d");
let angle=0,spinning=false;

const rewards=[50,100,150,300,500,1000];

function draw(){
  let arc=(2*Math.PI)/rewards.length;
  for(let i=0;i<rewards.length;i++){
    ctx.beginPath();
    ctx.fillStyle=rewards[i]==1000?"gold":(i%2?"#ff00cc":"#330066");
    ctx.moveTo(130,130);
    ctx.arc(130,130,130,i*arc,(i+1)*arc);
    ctx.fill();
  }
}
draw();

spinBtn.onclick=()=>{
  if(spinning)return;
  spinning=true;

  play(spinSound);
  vibrate(100);

  let target=angle+Math.random()*10;
  let start=null;

  function anim(t){
    if(!start)start=t;
    let p=(t-start)/3000;
    if(p>1)p=1;

    let cur=angle+(target-angle)*p;

    ctx.clearRect(0,0,260,260);
    ctx.save();
    ctx.translate(130,130);
    ctx.rotate(cur);
    ctx.translate(-130,-130);
    draw();
    ctx.restore();

    if(p<1)requestAnimationFrame(anim);
    else{
      angle=target;
      finish();
    }
  }
  requestAnimationFrame(anim);
};

function finish(){
  spinning=false;

  let win=rewards[Math.floor(Math.random()*rewards.length)];
  coins+=win;

  play(winSound);
  vibrate(200);

  showWin(win);
  coinBlast();
  confetti();

  updateUI();
}

// 🎉 WIN UI
function showWin(x){
  winPopup.innerText="+"+x;
  winPopup.classList.add("show");
  setTimeout(()=>winPopup.classList.remove("show"),1500);
}

// 💰 COIN BLAST
function coinBlast(){
  for(let i=0;i<10;i++){
    let c=document.createElement("div");
    c.innerText="💰";
    c.style.position="fixed";
    c.style.left="50%";
    c.style.top="50%";
    document.body.appendChild(c);

    c.animate([
      {transform:"translate(0,0)",opacity:1},
      {transform:`translate(${Math.random()*200-100}px,${Math.random()*200-100}px)`,opacity:0}
    ],{duration:800});

    setTimeout(()=>c.remove(),800);
  }
}

// 🎊 CONFETTI
const cf=confettiCanvas.getContext("2d");
confettiCanvas.width=innerWidth;
confettiCanvas.height=innerHeight;

let parts=[];

function confetti(){
  parts=[];
  for(let i=0;i<50;i++){
    parts.push({x:Math.random()*innerWidth,y:0,r:5});
  }
  animate();
}

function animate(){
  cf.clearRect(0,0,innerWidth,innerHeight);
  parts.forEach(p=>{
    cf.fillRect(p.x,p.y,p.r,p.r);
    p.y+=3;
  });
  requestAnimationFrame(animate);
}

// WITHDRAW
function withdraw(){
  if(coins<1000)return alert("Min ₹10");
  coins=0;
  updateUI();
  alert("Withdraw Sent 💸");
}

// INIT
updateUI();

</script>

</body>
</html>
