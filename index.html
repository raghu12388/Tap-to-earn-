 <!DOCTYPE html>
<html>
<head>
<title>Tap2Earn Viral</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(180deg,#1a0033,#000);
color:white;
text-align:center;
}
.card{margin:15px;padding:20px;border-radius:15px;background:rgba(255,255,255,0.08)}
.btn{padding:12px;margin:5px;border:none;border-radius:10px;background:#ff00cc;color:white}
.tap{width:140px;height:140px;border-radius:50%;background:#ff00cc;color:white;border:none;font-size:30px}
.footer{position:fixed;bottom:0;width:100%;background:#000;display:flex;justify-content:space-around}
.page{display:none}
.active{display:block}
</style>
</head>

<body>

<div id="home" class="page active">

<div class="card">
<h2>💰 <span id="coins">0</span></h2>
<p>Level: <span id="level">1</span></p>
</div>

<div class="card">
<button class="tap" onclick="tap()">🚀</button>
</div>

<div class="card">
<button class="btn" onclick="watchAd()">Watch Ad</button>
<button class="btn" onclick="daily()">Daily</button>
<button class="btn" onclick="invite()">Invite</button>
<button class="btn" onclick="spinAd()">Spin</button>
</div>

</div>

<div id="spinPage" class="page">
<div class="card">
<canvas id="wheel" width="260" height="260"></canvas>
</div>
<button class="btn" onclick="spinAd()">Spin</button>
</div>

<div class="footer">
<button onclick="nav('home')">Home</button>
<button onclick="nav('spinPage')">Spin</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

// 🔥 MULTI ADS
const ADS=[
"https://omg10.com/4/10880497",
"https://www.profitablecpmratenetwork.com/v461hnp1f?key=1b701233666cb461a77abce620d8c1ae"
];

function getAd(){
return ADS[Math.floor(Math.random()*ADS.length)];
}

// FIREBASE
firebase.initializeApp({
apiKey:"AIzaSy...",
authDomain:"tap2earn-4ef6d.firebaseapp.com",
databaseURL:"https://tap2earn-4ef6d-default-rtdb.firebaseio.com/",
projectId:"tap2earn-4ef6d"
});
const db=firebase.database();

// USER
let tg=window.Telegram?.WebApp;
let userId="user_"+Math.floor(Math.random()*999999);
let ref=new URLSearchParams(location.search).get("ref");

if(tg && tg.initDataUnsafe?.user){
userId=tg.initDataUnsafe.user.id;
}

// DATA
let coins=0,level=1;

// LOAD
function load(){
db.ref("users/"+userId).once("value",snap=>{
let d=snap.val();

if(!d){

let bonus=0;

if(ref && ref!==userId){
bonus=500;
db.ref("users/"+ref+"/coins").transaction(c=>(c||0)+500);
}

db.ref("users/"+userId).set({
coins:100+bonus,
level:1
});

}else{
coins=d.coins||0;
level=d.level||1;
}

update();
});
}

// SAVE
function save(){
db.ref("users/"+userId).update({coins,level});
}

// UI
function update(){
document.getElementById("coins").innerText=coins;
document.getElementById("level").innerText=level;
}

// TAP
window.tap=function(){
coins++;
update();
save();
}

// DAILY
window.daily=function(){
coins+=500;
update();
save();
}

// 🎯 COOLDOWN
function canAd(){
let last=localStorage.getItem("ad");
if(!last)return true;
return Date.now()-last>30000;
}

// ADS
window.watchAd=function(){

if(!canAd()){
alert("Wait 30 sec");
return;
}

localStorage.setItem("ad",Date.now());
localStorage.setItem("ad_start",Date.now());

let link=getAd();

if(window.Telegram){
Telegram.WebApp.openLink(link);
}else{
window.location.href=link;
}
}

// VERIFY
window.onfocus=function(){

let s=localStorage.getItem("ad_start");
if(!s)return;

let t=Date.now()-s;
localStorage.removeItem("ad_start");

if(t>8000){

let r=[50,100,150,200][Math.floor(Math.random()*4)];

coins+=r;
update();
save();

alert("Earned "+r);

if(localStorage.getItem("spin")){
localStorage.removeItem("spin");
spin();
}

}
}

// 🎰 SPIN
const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

const rewards=[50,100,200,300];
const arc=(2*Math.PI)/rewards.length;

function draw(){
for(let i=0;i<rewards.length;i++){
ctx.beginPath();
ctx.fillStyle=i%2?"#ff00cc":"#330066";
ctx.moveTo(130,130);
ctx.arc(130,130,130,i*arc,(i+1)*arc);
ctx.fill();

ctx.save();
ctx.translate(130,130);
ctx.rotate(i*arc+arc/2);
ctx.fillStyle="white";
ctx.fillText(rewards[i],80,10);
ctx.restore();
}
}
draw();

window.spin=function(){
let win=rewards[Math.floor(Math.random()*rewards.length)];
coins+=win;
update();
save();
alert("Won "+win);
}

window.spinAd=function(){
localStorage.setItem("spin","yes");
watchAd();
}

// 🚀 VIRAL INVITE
window.invite=function(){
let link=location.origin+"?ref="+userId;

navigator.clipboard.writeText(link);

alert("Invite link copied!\n"+link);
}

// NAV
window.nav=function(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// INIT
load();

});
</script>

</body>
</html>
