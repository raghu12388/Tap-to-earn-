 <!DOCTYPE html>
<html>
<head>
<title>Tap2Earn SECURE</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
margin:0;font-family:sans-serif;
background:linear-gradient(180deg,#0f0c29,#302b63,#000);
color:white;text-align:center;
}

.card{margin:15px;padding:20px;border-radius:15px;background:rgba(255,255,255,0.08)}
.tap{width:140px;height:140px;border-radius:50%;background:#ff00cc;color:white;border:none;font-size:30px}
.btn{padding:12px;margin:6px;border:none;border-radius:12px;background:#ff00cc;color:white}

.footer{position:fixed;bottom:0;width:100%;background:#000;display:flex;justify-content:space-around}
.page{display:none}
.active{display:block}

.progress{width:80%;height:10px;background:#333;margin:auto;border-radius:10px}
.bar{height:100%;width:0%;background:#ff00cc}
</style>
</head>

<body>

<div id="home" class="page active">

<div class="card">
<h2>💰 <span id="coins">0</span></h2>
<p>Level: <span id="level">1</span></p>

<div class="progress"><div id="bar" class="bar"></div></div>
<p>XP: <span id="xp">0</span>/<span id="need">100</span></p>
</div>

<div class="card">
<button class="tap" onclick="tap()">🚀</button>
</div>

<div class="card">
<button class="btn" onclick="watchAd()">💰 Watch Ad</button>
<button class="btn" onclick="spin()">🎰 Spin</button>
<button class="btn" onclick="daily()">🎁 Daily</button>
</div>

</div>

<div class="footer">
<button onclick="nav('home')">Home</button>
</div>

<script>

// DATA
let coins=0,level=1,xp=0,need=100;

// ADS LIST (MULTI CPM)
const ADS=[
"https://omg10.com/4/10880497",
"https://www.profitablecpmratenetwork.com/v461hnp1f?key=1b701233666cb461a77abce620d8c1ae"
];

function getAd(){
return ADS[Math.floor(Math.random()*ADS.length)];
}

// UPDATE
function update(){
coinsEl.innerText=coins;
levelEl.innerText=level;
xpEl.innerText=xp;
needEl.innerText=need;
bar.style.width=(xp/need*100)+"%";
}

// XP
function addXP(v){
xp+=v;
if(xp>=need){
xp=0;
level++;
need+=50;
alert("🔥 Level Up!");
}
}

// TAP
function tap(){
coins++;
addXP(5);
update();
}

// DAILY (ANTI CHEAT)
function daily(){

let last=localStorage.getItem("daily");
let now=Date.now();

if(last && now-last < 86400000){
alert("Come tomorrow!");
return;
}

localStorage.setItem("daily", now);

coins+=500;
addXP(50);
update();
}

// 🚀 WATCH AD (SECURE)
function watchAd(){

// COOLDOWN
let last=localStorage.getItem("ad_time");
let now=Date.now();

if(last && now-last < 30000){
alert("Wait 30 seconds!");
return;
}

localStorage.setItem("ad_time", now);

// START TRACK
localStorage.setItem("ad_start", now);

// RANDOM AD
let link=getAd();

// OPEN SAFE
if(window.Telegram && Telegram.WebApp){
Telegram.WebApp.openLink(link);
}else{
window.open(link,"_blank");
}
}

// 🔥 AUTO VERIFY SYSTEM
window.onfocus=function(){

let start=localStorage.getItem("ad_start");
if(!start) return;

let stayTime=Date.now()-start;

// REMOVE TRACK
localStorage.removeItem("ad_start");

// ❌ ANTI CHEAT
if(stayTime < 8000){
alert("❌ Ad skipped!");
return;
}

// ✅ VALID USER
let reward=Math.floor(Math.random()*50)+50;

coins+=reward;
addXP(20);

// SAVE ADS COUNT
let ads=parseInt(localStorage.getItem("ads")||0)+1;
localStorage.setItem("ads",ads);

update();

alert("💰 Earned "+reward);
}

// NAV
function nav(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// INIT
let coinsEl=document.getElementById("coins");
let levelEl=document.getElementById("level");
let xpEl=document.getElementById("xp");
let needEl=document.getElementById("need");
let bar=document.getElementById("bar");

update();

</script>

</body>
</html>
