 <!DOCTYPE html>
<html>
<head>
<title>Tap2Earn FINAL FIXED</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body{
  margin:0;
  text-align:center;
  font-family:sans-serif;
  background:#000;
  color:white;
}

.btn{
  margin:6px;
  padding:10px;
  background:#222;
  border:none;
  color:white;
  border-radius:8px;
}

.tap{
  width:150px;
  height:150px;
  border-radius:50%;
  background:#ff00cc;
  font-size:25px;
  border:none;
  color:white;
}

#game{display:none;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>🔐 Login</h2>
  <input id="email" placeholder="Email"><br><br>
  <input id="pass" type="password" placeholder="Password"><br><br>
  <button class="btn" id="signupBtn">Sign Up</button>
  <button class="btn" id="loginBtn">Login</button>
</div>

<!-- GAME -->
<div id="game">
  <h1>💰 <span id="coins">0</span></h1>

  <button class="tap" id="tapBtn">🚀</button><br>

  <button class="btn" id="vipBtn">💎 VIP</button>
  <button class="btn" id="withdrawBtn">💸 Withdraw</button>
  <button class="btn" id="adminBtn">👑 Admin</button>
</div>

<script type="module">

// 🔥 FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import {
  getAuth, createUserWithEmailAndPassword,
  signInWithEmailAndPassword, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey:"YOUR_KEY",
  authDomain:"YOUR_DOMAIN",
  projectId:"YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let userId;
let coins = 0;
let isVIP = false;

// UI
function updateUI(){
  document.getElementById("coins").innerText = coins;
}

// SAVE
async function save(){
  await setDoc(doc(db,"users",userId),{
    coins,
    isVIP
  });
}

// LOAD USER
onAuthStateChanged(auth, async(user)=>{
  if(user){
    userId = user.uid;

    document.getElementById("loginBox").style.display="none";
    document.getElementById("game").style.display="block";

    let ref = doc(db,"users",userId);
    let snap = await getDoc(ref);

    if(snap.exists()){
      coins = snap.data().coins || 0;
      isVIP = snap.data().isVIP || false;
    } else {
      await setDoc(ref,{coins:0,isVIP:false});
    }

    updateUI();
  }
});

// BUTTON EVENTS (NO BUG VERSION)

// SIGNUP
document.getElementById("signupBtn").onclick = ()=>{
  let e = document.getElementById("email").value;
  let p = document.getElementById("pass").value;

  createUserWithEmailAndPassword(auth,e,p)
  .then(()=>alert("Account Created"));
};

// LOGIN
document.getElementById("loginBtn").onclick = ()=>{
  let e = document.getElementById("email").value;
  let p = document.getElementById("pass").value;

  signInWithEmailAndPassword(auth,e,p);
};

// TAP
document.getElementById("tapBtn").onclick = ()=>{
  coins += isVIP ? 2 : 1;
  updateUI();
  save();
};

// VIP
document.getElementById("vipBtn").onclick = ()=>{
  let options={
    key:"YOUR_RAZORPAY_KEY",
    amount:9900,
    currency:"INR",
    name:"VIP Upgrade",
    handler:function(){
      isVIP = true;
      save();
      alert("VIP Activated 💎");
    }
  };
  new Razorpay(options).open();
};

// WITHDRAW
document.getElementById("withdrawBtn").onclick = ()=>{
  alert("Withdrawal request sent 💸");
};

// ADMIN
document.getElementById("adminBtn").onclick = ()=>{
  if(userId === "YOUR_ADMIN_UID"){
    window.location.href="admin.html";
  } else {
    alert("Access Denied ❌");
  }
};

</script>

</body>
</html>
