 <!DOCTYPE html>
<html>
<head>
<title>Tap2Earn AUTO MONEY</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
  text-align:center;
  padding-bottom:80px;
}

.page{display:none;}
.activePage{display:block;}

.tap{
  width:160px;height:160px;
  border-radius:50%;
  background:radial-gradient(circle,#ff00cc,#330066);
  border:none;
  font-size:30px;
  color:white;
}

.btn{
  padding:10px 20px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#ff00cc;
  color:white;
}

.footer{
  position:fixed;
  bottom:0;
  width:100%;
  height:70px;
  background:#111;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.nav-btn{
  color:#aaa;
  background:none;
  border:none;
}
.nav-btn.active{
  color:#ff00cc;
}

/* POINTER */
.pointer{
  position:absolute;
  top:5px;
  left:50%;
  transform:translateX(-50%);
  font-size:28px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page activePage">
  <h1>💰 <span id="coins">0</span></h1>
  <button class="tap" id="tapBtn">🚀</button><br><br>
  <button class="btn" onclick="watchAd()">🎁 Watch Ad & Earn</button>
</div>

<!-- SPIN -->
<div id="spinPage" class="page">
  <div style="position:relative">
    <div class="pointer">🔻</div>
    <canvas id="wheel" width="260" height="260"></canvas>
  </div>
  <br>
  <button class="btn" id="spinBtn">🎰 SPIN</button>
</div>

<!-- WALLET -->
<div id="walletPage" class="page">
  <h2>Balance ₹ <span id="balance">0</span></h2>
  <button class="btn" onclick="withdraw()">Withdraw</button>
</div>

<!-- FOOTER -->
<div class="footer">
  <button class="nav-btn active" onclick="nav('home',this)">Home</button>
  <button class="nav-btn" onclick="nav('spinPage',this)">Spin</button>
  <button class="nav-btn" onclick="nav('walletPage',this)">Wallet</button>
</div>

<script>
window.onload = function(){

// ===== DATA =====
let coins = 0;

// ===== UI =====
function updateUI(){
  document.getElementById("coins").innerText = coins;
  document.getElementById("balance").innerText = (coins/100).toFixed(2);
}

// ===== NAV =====
window.nav = function(id,btn){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("activePage"));
  document.getElementById(id).classList.add("activePage");

  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

// ===== TAP =====
document.getElementById("tapBtn").onclick = function(){
  coins++;
  updateUI();
}

// ===== ADS SYSTEM =====
const AD_LINK = "https://www.profitableratecpm.com/xxxxx";

// open ad + mark return
function openAdAndPrepare(){
  localStorage.setItem("auto_spin","yes");
  window.location.href = AD_LINK;
}

// watch ad button
window.watchAd = function(){
  openAdAndPrepare();
}

// ===== SPIN SYSTEM =====
const ctx = document.getElementById("wheel").getContext("2d");
let spinning=false, angle=0;

const rewards=[50,100,150,300,500,1000];
const arc=(2*Math.PI)/rewards.length;

function draw(highlight=-1){
  for(let i=0;i<rewards.length;i++){
    ctx.beginPath();
    ctx.fillStyle=i==highlight?"gold":(i%2?"#ff00cc":"#330066");
    ctx.moveTo(130,130);
    ctx.arc(130,130,130,i*arc,(i+1)*arc);
    ctx.fill();

    ctx.save();
    ctx.translate(130,130);
    ctx.rotate(i*arc+arc/2);
    ctx.fillStyle="white";
    ctx.textAlign="center";
    ctx.fillText("💰",80,-5);
    ctx.fillText(rewards[i],80,15);
    ctx.restore();
  }
}
draw();

// spin button
document.getElementById("spinBtn").onclick = function(){
  if(spinning)return;
  openAdAndPrepare();
};

// auto spin after return
function checkAutoSpin(){
  if(localStorage.getItem("auto_spin")=="yes"){
    localStorage.removeItem("auto_spin");

    setTimeout(()=>{
      spin();
    },1000);
  }
}

// real spin
function spin(){
  spinning=true;

  let index=Math.floor(Math.random()*rewards.length);
  let stopAngle=(Math.PI*2)-(index*arc)-arc/2;
  let target=angle+Math.PI*6+stopAngle;

  let start=null;

  function anim(t){
    if(!start)start=t;

    let p=(t-start)/3000;
    if(p>1)p=1;

    let ease=1-Math.pow(1-p,3);
    let cur=angle+(target-angle)*ease;

    ctx.clearRect(0,0,260,260);
    ctx.save();
    ctx.translate(130,130);
    ctx.rotate(cur);
    ctx.translate(-130,-130);
    draw();
    ctx.restore();

    if(p<1){
      requestAnimationFrame(anim);
    }else{
      angle=target%(Math.PI*2);
      finish(index);
    }
  }

  requestAnimationFrame(anim);
}

// finish
function finish(index){
  spinning=false;

  let win=rewards[index];
  coins+=win;

  updateUI();

  alert("🎉 Won "+win);
}

// withdraw
window.withdraw=function(){
  if(coins<1000){
    alert("Min ₹10");
    return;
  }
  coins=0;
  updateUI();
  alert("Withdraw Sent 💸");
}

// init
updateUI();
checkAutoSpin();

}
</script>

</body>
</html>
