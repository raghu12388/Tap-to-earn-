 <!DOCTYPE html>
<html>
<head>
  <title>Tap2Earn ULTRA PRO</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin:0;
      text-align:center;
      font-family:sans-serif;
      background: radial-gradient(circle,#0f0f0f,#000);
      color:white;
    }

    h1 { margin-top:20px; }

    .level { color:#00ffcc; }

    .tap-btn {
      margin-top:40px;
      width:160px;
      height:160px;
      border-radius:50%;
      font-size:24px;
      background: linear-gradient(45deg,#ff00cc,#3333ff);
      box-shadow:0 0 40px #ff00cc;
      border:none;
      color:white;
    }

    .tap-btn:active { transform:scale(0.9); }

    .btn {
      margin:8px;
      padding:10px 18px;
      border:none;
      border-radius:8px;
      background:#222;
      color:white;
    }

    .coin {
      position:absolute;
      color:gold;
      animation:float 1s linear forwards;
    }

    @keyframes float {
      from {transform:translateY(0);}
      to {transform:translateY(-80px); opacity:0;}
    }
  </style>
</head>

<body>

<h1>💰 <span id="coins">0</span></h1>
<div class="level">Level: <span id="level">1</span> 🔥</div>

<button class="tap-btn" onclick="tap()">🚀</button>

<br>

<button class="btn" onclick="spin()">🎡 Spin</button>
<button class="btn" onclick="buyAuto()">⚡ Auto</button>
<button class="btn" onclick="dailyBonus()">🎁 Bonus</button>
<button class="btn" onclick="withdraw()">💸 Withdraw</button>
<button class="btn" onclick="share()">📲 Invite</button>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let userId = tg.initDataUnsafe?.user?.id || "demo";

// DATA
let coins = 0;
let autoTap = 0;

// LOAD
function load() {
  let data = JSON.parse(localStorage.getItem(userId)) || {
    coins: 0,
    autoTap: 0,
    lastBonus: 0
  };

  coins = data.coins;
  autoTap = data.autoTap;

  updateUI();
}

// SAVE
function save() {
  localStorage.setItem(userId, JSON.stringify({
    coins,
    autoTap,
    lastBonus: Date.now()
  }));
}

// UI UPDATE
function updateUI() {
  document.getElementById("coins").innerText = coins;
  document.getElementById("level").innerText = Math.floor(coins/100)+1;
}

// TAP
function tap() {
  coins++;

  let c = document.createElement("div");
  c.innerText = "+1";
  c.className = "coin";
  c.style.left = Math.random()*window.innerWidth + "px";
  c.style.top = "50%";
  document.body.appendChild(c);

  setTimeout(()=>c.remove(),1000);

  if (navigator.vibrate) navigator.vibrate(20);

  updateUI();
  save();

  if (Math.random() < 0.1) {
    coins += 5;
    alert("🔥 Bonus +5 coins!");
  }
}

// AUTO TAP
function buyAuto() {
  if (coins < 200) return alert("Need 200 coins ❌");
  coins -= 200;
  autoTap++;
  alert("⚡ Auto Tap Activated!");
  save();
}

// AUTO LOOP
setInterval(()=>{
  coins += autoTap;
  updateUI();
  save();
},1000);

// DAILY BONUS
function dailyBonus() {
  let data = JSON.parse(localStorage.getItem(userId));

  if (!data.lastBonus || Date.now() - data.lastBonus > 86400000) {
    coins += 100;
    alert("🎁 +100 Coins!");
    save();
    updateUI();
  } else {
    alert("Come tomorrow ❌");
  }
}

// SPIN
function spin() {
  let reward = Math.floor(Math.random()*200);
  coins += reward;
  alert("🎡 You won " + reward);
  save();
  updateUI();
}

// WITHDRAW
function withdraw() {
  if (coins < 1000) return alert("Minimum 1000 coins ❌");
  alert("💸 Withdrawal requested!");
  coins = 0;
  save();
  updateUI();
}

// SHARE (VIRAL)
function share() {
  let link = "https://t.me/tap2earn1995bot?start=" + userId;
  tg.openTelegramLink(link);
}

// FAKE LIVE ACTIVITY
setInterval(()=>{
  let names = ["Rahul","Aman","Priya","Rohit","Neha"];
  let name = names[Math.floor(Math.random()*names.length)];
  console.log(name + " earned ₹20 💸");
},4000);

// INIT
load();
</script>

</body>
</html>
