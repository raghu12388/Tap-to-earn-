 <!DOCTYPE html>
<html>
<head>
<title>Tap2Earn FINAL FIX</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  text-align:center;
  font-family:sans-serif;
}

.tap{
  width:150px;height:150px;
  border-radius:50%;
  background:#ff00cc;
  border:none;
  font-size:30px;
  color:white;
}

.btn{
  padding:10px 20px;
  margin:10px;
  background:#ff00cc;
  border:none;
  color:white;
}

.pointer{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
}
</style>
</head>

<body>

<h1>💰 <span id="coins">0</span></h1>

<button class="tap" id="tapBtn">🚀</button>
<br><br>

<button class="btn" onclick="watchAd()">🎁 Watch Ad</button>

<div style="position:relative;margin-top:20px;">
  <div class="pointer">🔻</div>
  <canvas id="wheel" width="260" height="260"></canvas>
</div>

<br>
<button class="btn" id="spinBtn">🎰 SPIN</button>

<script>

// ===== DATA =====
let coins = 0;

// ===== UI =====
function updateUI(){
  document.getElementById("coins").innerText = coins;
}

// ===== TAP =====
document.getElementById("tapBtn").onclick = ()=>{
  coins++;
  updateUI();
};

// ===== AD LINK =====
const AD_LINK = "https://www.profitableratecpm.com/xxxxx";

// ===== SAFE AD OPEN =====
function openAd(){
  if(window.Telegram && Telegram.WebApp){
    Telegram.WebApp.openLink(AD_LINK,{try_instant_view:false});
  } else {
    window.open(AD_LINK,"_blank");
  }
}

// ===== WATCH AD =====
function watchAd(){
  localStorage.setItem("auto_spin","yes");
  openAd();
}

// ===== CANVAS =====
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let spinning = false;
let angle = 0;

const rewards = [50,100,150,300,500,1000];
const arc = (2*Math.PI)/rewards.length;

// DRAW
function draw(high=-1){
  ctx.clearRect(0,0,260,260);

  for(let i=0;i<rewards.length;i++){
    ctx.beginPath();
    ctx.fillStyle = i==high ? "gold" : (i%2 ? "#ff00cc" : "#330066");

    ctx.moveTo(130,130);
    ctx.arc(130,130,130,i*arc,(i+1)*arc);
    ctx.fill();

    ctx.save();
    ctx.translate(130,130);
    ctx.rotate(i*arc+arc/2);

    ctx.fillStyle="white";
    ctx.textAlign="center";

    ctx.fillText("💰",80,-5);
    ctx.fillText(rewards[i],80,15);

    ctx.restore();
  }
}
draw();

// SPIN BUTTON
document.getElementById("spinBtn").onclick = ()=>{
  if(spinning) return;

  localStorage.setItem("auto_spin","yes");
  openAd();
};

// AUTO RETURN
function checkReturn(){
  if(localStorage.getItem("auto_spin")=="yes"){
    localStorage.removeItem("auto_spin");

    setTimeout(()=>{
      spin();
    },1000);
  }
}

// SPIN FUNCTION
function spin(){

  spinning = true;

  let index = Math.floor(Math.random()*rewards.length);
  let stop = (Math.PI*2)-(index*arc)-arc/2;

  let target = angle + Math.PI*6 + stop;

  let start = null;

  function animate(t){
    if(!start) start = t;

    let p = (t-start)/3000;
    if(p>1) p=1;

    let ease = 1-Math.pow(1-p,3);
    let current = angle + (target-angle)*ease;

    ctx.clearRect(0,0,260,260);

    ctx.save();
    ctx.translate(130,130);
    ctx.rotate(current);
    ctx.translate(-130,-130);

    draw();
    ctx.restore();

    if(p<1){
      requestAnimationFrame(animate);
    } else {
      angle = target % (Math.PI*2);
      finish(index);
    }
  }

  requestAnimationFrame(animate);
}

// RESULT
function finish(index){
  spinning = false;

  let win = rewards[index];
  coins += win;

  updateUI();

  draw(index);

  alert("🎉 Won "+win);
}

// INIT
updateUI();
checkReturn();

</script>

</body>
</html>
