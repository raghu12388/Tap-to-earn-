 <!DOCTYPE html>
<html>
<head>
  <title>Tap2Earn FINAL</title>

  <!-- Telegram -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin:0;
      text-align:center;
      font-family:sans-serif;
      background:#000;
      color:white;
    }

    .tap-btn {
      margin-top:40px;
      width:160px;
      height:160px;
      border-radius:50%;
      background:linear-gradient(45deg,#ff00cc,#3333ff);
      color:white;
      font-size:24px;
    }

    .btn {
      margin:8px;
      padding:10px;
      background:#222;
      color:white;
      border:none;
    }
  </style>
</head>

<body>

<h1>💰 <span id="coins">0</span></h1>
<h3>Level: <span id="level">1</span></h3>

<button class="tap-btn" onclick="tap()">🚀</button>

<br>
<button class="btn" onclick="spin()">🎡 Spin</button>
<button class="btn" onclick="buyAuto()">⚡ Auto</button>
<button class="btn" onclick="withdraw()">💸 Withdraw</button>
<button class="btn" onclick="share()">📲 Invite</button>
<button class="btn" onclick="showLeaderboard()">🏆 Leaderboard</button>

<script type="module">

// 🔥 FIREBASE IMPORT
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  updateDoc,
  increment,
  collection,
  query,
  orderBy,
  limit,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔑 YOUR CONFIG
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// TELEGRAM
const tg = window.Telegram.WebApp;
tg.expand();

let userId = tg.initDataUnsafe?.user?.id?.toString() || "demo";

// REFERRAL
const params = new URLSearchParams(window.location.search);
const ref = params.get("start");

// DATA
let coins = 0;
let autoTap = 0;

// LOAD
async function load() {
  const refDoc = doc(db, "users", userId);
  const snap = await getDoc(refDoc);

  if (snap.exists()) {
    let data = snap.data();
    coins = data.coins || 0;
    autoTap = data.autoTap || 0;
  } else {
    await setDoc(refDoc, { coins: 0, autoTap: 0 });
  }

  // 🔥 REFERRAL REWARD
  if (ref && ref !== userId) {
    const refUser = doc(db, "users", ref);
    await updateDoc(refUser, {
      coins: increment(50)
    });
  }

  updateUI();
}

// SAVE
async function save() {
  const refDoc = doc(db, "users", userId);

  await setDoc(refDoc, {
    coins,
    autoTap,
    updatedAt: Date.now()
  });
}

// UI
function updateUI() {
  document.getElementById("coins").innerText = coins;
  document.getElementById("level").innerText = Math.floor(coins/100)+1;
}

// TAP
window.tap = function () {
  coins++;
  updateUI();
  save();
}

// AUTO
window.buyAuto = function () {
  if (coins < 200) return alert("Need 200 ❌");
  coins -= 200;
  autoTap++;
  updateUI();
  save();
}

// SPIN
window.spin = function () {
  let reward = Math.floor(Math.random()*200);
  coins += reward;
  alert("🎡 Won " + reward);
  updateUI();
  save();
}

// WITHDRAW
window.withdraw = function () {
  if (coins < 1000) return alert("Min 1000 ❌");
  alert("💸 Withdrawal request sent!");
  coins = 0;
  updateUI();
  save();
}

// SHARE
window.share = function () {
  let link = "https://t.me/tap2earn1995bot?start=" + userId;
  tg.openTelegramLink(link);
}

// LEADERBOARD
window.showLeaderboard = async function () {
  const q = query(collection(db, "users"), orderBy("coins","desc"), limit(5));
  const snap = await getDocs(q);

  let text = "🏆 TOP PLAYERS:\n\n";

  let i = 1;
  snap.forEach(doc => {
    text += i + ". " + doc.id + " - " + doc.data().coins + " 💰\n";
    i++;
  });

  alert(text);
}

// AUTO LOOP
setInterval(()=>{
  coins += autoTap;
  updateUI();
  save();
},1000);

// INIT
load();

</script>

</body>
</html>
